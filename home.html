<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTP FC 통합 홈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모바일 터치 하이라이트 제거 및 스크롤바 숨김 */
        * { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .system-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .system-card:active { transform: scale(0.96); }
        
        /* 암호 입력 애니메이션 */
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        /* 로고 에니메이션 */
        .logo-glow { filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.3)); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <!-- 상단 헤더 -->
    <header class="bg-gray-900 text-white py-2 px-4 shadow-lg z-10 flex-shrink-0 border-b border-gray-800">
        <h1 class="text-base font-black text-center tracking-tighter italic" id="header-title">OTP FC HUB</h1>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-1 overflow-hidden relative w-full max-w-lg mx-auto bg-gray-50 flex flex-col" id="main-content">
        
        <!-- ================= [홈 탭 뷰] ================= -->
        <div id="view-home" class="p-3 h-full hidden flex flex-col justify-center gap-2">
            <!-- 팀 엠블럼 추가 -->
            <div class="flex justify-center mb-1">
                <div class="w-24 h-24 rounded-full bg-white shadow-inner flex items-center justify-center p-1 border border-pink-100">
                    <!-- 이미지를 같은 경로에 logo.png로 저장해두시면 보입니다. -->
                    <img src="./logo.png" alt="OTP FC Emblem" class="w-full h-full object-contain logo-glow" onerror="this.src='https://via.placeholder.com/100?text=OTP+FC'">
                </div>
            </div>

            <div class="mb-1 text-center">
                <h2 class="text-lg font-bold text-gray-900 leading-tight">반갑습니다! 👋</h2>
                <p class="text-[10px] text-gray-400 font-medium italic">ONE TWO PASS FUTSAL CLUB</p>
            </div>
            
            <div id="link-buttons-container" class="flex flex-col gap-2">
                <!-- JS에서 동적 생성됨 -->
            </div>
        </div>

        <!-- ================= [비밀번호 확인 뷰] ================= -->
        <div id="view-auth" class="p-6 h-full hidden flex flex-col items-center justify-center">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 w-full max-w-sm text-center">
                <div class="w-12 h-12 bg-gray-100 text-gray-900 rounded-full flex items-center justify-center mx-auto mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-lg font-bold mb-1">관리자 인증</h2>
                <p class="text-xs text-gray-400 mb-5">PIN 4자리를 입력하세요.</p>
                
                <div class="flex flex-col gap-3" id="auth-form">
                    <input type="password" id="admin-pin" maxlength="4" placeholder="••••" class="text-center text-xl tracking-[1em] w-full bg-gray-50 border border-gray-200 rounded-xl py-3 focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all">
                    <button onclick="checkPin()" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition-all text-sm">확인</button>
                    <button onclick="switchTab('home')" class="text-gray-400 text-xs font-medium">홈으로 돌아가기</button>
                </div>
            </div>
        </div>

        <!-- ================= [설정 탭 뷰] ================= -->
        <div id="view-settings" class="p-4 h-full hidden flex flex-col overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-end mb-4 flex-shrink-0">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">시스템 설정</h2>
                    <p class="text-xs text-gray-500">각 시스템 링크를 관리합니다.</p>
                </div>
                <button onclick="lockAdmin()" class="bg-gray-200 text-gray-600 px-3 py-1 rounded-lg text-[10px] font-bold">로그아웃</button>
            </div>

            <!-- 새 링크 추가 폼 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 mb-4 flex-shrink-0">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">추가 시스템 등록</h3>
                <div class="flex flex-col gap-2">
                    <input type="text" id="new-name" placeholder="이름" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-gray-900">
                    <input type="url" id="new-url" placeholder="https://..." class="w-full bg-gray-50 border border-gray-100 rounded-lg px-3 py-2 text-[10px] focus:outline-none focus:ring-2 focus:ring-gray-900 font-mono">
                    <button onclick="addNewLink()" class="w-full bg-gray-900 text-white font-bold py-2 rounded-lg text-xs transition-all mt-1">등록</button>
                </div>
            </div>

            <div id="registered-links-container" class="flex flex-col gap-2 pb-20">
                <!-- JS에서 동적 생성됨 -->
            </div>
        </div>

    </main>

    <!-- 하단 네비게이션 바 -->
    <nav class="bg-white border-t border-gray-100 fixed bottom-0 w-full max-w-lg left-1/2 transform -translate-x-1/2 z-20 pb-safe shadow-lg">
        <div class="flex justify-around items-center h-12 px-10">
            <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center justify-center w-12 h-10 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tight">홈</span>
            </button>
            <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center justify-center w-12 h-10 rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tight text-gray-400">관리</span>
            </button>
        </div>
    </nav>

    <!-- 토스트 알림 -->
    <div id="toast" class="fixed bottom-16 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-2 rounded-full shadow-2xl text-[10px] font-bold transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50">
        메세지
    </div>

    <script>
        const PIN = "2295";
        let isAdminAuthenticated = false;

        const icons = {
            attendance: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>`,
            roster: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`,
            teammaker: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>`,
            match: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>`,
            default: `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>`
        };

        const fixedLinks = [
            { id: 'att', name: '출결 관리', url: 'https://nakdo0415-crypto.github.io/OTP-FC/attendance.html', color: 'emerald', icon: 'attendance' },
            { id: 'ros', name: '명단 관리', url: 'https://nakdo0415-crypto.github.io/OTP-FC/index.html', color: 'blue', icon: 'roster' },
            { id: 'tmk', name: '팀편성', url: 'https://nakdo0415-crypto.github.io/OTP-FC/team maker.html', color: 'indigo', icon: 'teammaker' },
            { id: 'mat', name: '매치 테이블', url: 'https://nakdo0415-crypto.github.io/OTP-FC/match table.html', color: 'rose', icon: 'match' }
        ];

        let customLinks = [];

        function initApp() {
            const savedCustom = localStorage.getItem('otpfc_custom_links');
            if (savedCustom) {
                try { customLinks = JSON.parse(savedCustom); } catch (e) { customLinks = []; }
            }
            switchTab('home');
        }

        function saveCustomLinks() {
            localStorage.setItem('otpfc_custom_links', JSON.stringify(customLinks));
        }

        function switchTab(tab) {
            if (tab === 'settings' && !isAdminAuthenticated) {
                showAuthView();
                return;
            }

            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-settings').classList.add('hidden');
            document.getElementById('view-auth').classList.add('hidden');
            
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            const navHome = document.getElementById('nav-home');
            const navSettings = document.getElementById('nav-settings');
            
            if (tab === 'home') {
                navHome.classList.add('bg-gray-100', 'text-gray-900');
                navHome.classList.remove('text-gray-400');
                navSettings.classList.remove('bg-gray-100', 'text-gray-900');
                navSettings.classList.add('text-gray-400');
                renderHome();
            } else if (tab === 'settings') {
                navSettings.classList.add('bg-gray-100', 'text-gray-900');
                navSettings.classList.remove('text-gray-400');
                navHome.classList.remove('bg-gray-100', 'text-gray-900');
                navHome.classList.add('text-gray-400');
                renderSettings();
            }
        }

        function showAuthView() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-settings').classList.add('hidden');
            document.getElementById('view-auth').classList.remove('hidden');
            document.getElementById('admin-pin').value = "";
            document.getElementById('admin-pin').focus();
        }

        function checkPin() {
            const input = document.getElementById('admin-pin');
            const form = document.getElementById('auth-form');
            if (input.value === PIN) {
                isAdminAuthenticated = true;
                switchTab('settings');
                showToast('인증 성공');
            } else {
                form.classList.add('shake');
                showToast('PIN이 일치하지 않습니다.');
                setTimeout(() => form.classList.remove('shake'), 400);
                input.value = "";
            }
        }

        function lockAdmin() {
            isAdminAuthenticated = false;
            switchTab('home');
            showToast('로그아웃 되었습니다.');
        }

        function renderHome() {
            const container = document.getElementById('link-buttons-container');
            container.innerHTML = '';

            const colorMap = {
                emerald: { bg: 'bg-emerald-50', border: 'border-emerald-100', iconBg: 'bg-emerald-500', text: 'text-emerald-700', sub: 'text-emerald-500' },
                blue: { bg: 'bg-blue-50', border: 'border-blue-100', iconBg: 'bg-blue-600', text: 'text-blue-700', sub: 'text-blue-500' },
                indigo: { bg: 'bg-indigo-50', border: 'border-indigo-100', iconBg: 'bg-indigo-600', text: 'text-indigo-700', sub: 'text-indigo-500' },
                rose: { bg: 'bg-rose-50', border: 'border-rose-100', iconBg: 'bg-rose-500', text: 'text-rose-700', sub: 'text-rose-500' },
                gray: { bg: 'bg-white', border: 'border-gray-200', iconBg: 'bg-gray-500', text: 'text-gray-800', sub: 'text-gray-400' }
            };

            const allLinks = [...fixedLinks, ...customLinks];

            allLinks.forEach(link => {
                const style = colorMap[link.color] || colorMap.gray;
                const iconSvg = icons[link.icon] || icons.default;
                const btn = document.createElement('button');
                btn.className = `system-card w-full flex items-center p-3 rounded-xl border-b-2 transition-all shadow-sm ${style.bg} ${style.border} active:shadow-inner`;
                btn.onclick = () => { window.location.href = formatUrl(link.url); };

                btn.innerHTML = `
                    <div class="${style.iconBg} text-white shadow-md w-10 h-10 rounded-lg flex items-center justify-center mr-3 flex-shrink-0">
                        ${iconSvg}
                    </div>
                    <div class="text-left">
                        <div class="font-bold ${style.text} text-sm tracking-tighter">${link.name}</div>
                        <div class="text-[8px] font-bold ${style.sub} uppercase tracking-widest mt-0.5">System Access →</div>
                    </div>
                `;
                container.appendChild(btn);
            });
        }

        function renderSettings() {
            const container = document.getElementById('registered-links-container');
            container.innerHTML = '';
            if (customLinks.length === 0) container.innerHTML = '<p class="text-center py-4 text-xs text-gray-400 italic">추가로 등록된 시스템이 없습니다.</p>';

            customLinks.forEach(link => {
                const item = document.createElement('div');
                item.className = 'bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-2';
                item.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-[8px] font-black uppercase tracking-widest text-gray-400">커스텀 시스템</span>
                        <button onclick="deleteLink('${link.id}')" class="text-rose-500 p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                    <input type="text" value="${link.name}" oninput="updateLink('${link.id}', 'name', this.value)" class="w-full bg-gray-50 border border-gray-100 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-gray-900" placeholder="시스템 이름">
                    <input type="url" value="${link.url}" oninput="updateLink('${link.id}', 'url', this.value)" class="w-full bg-gray-50 border border-gray-100 rounded-lg px-3 py-1.5 text-[9px] focus:outline-none focus:border-gray-900 font-mono" placeholder="https://...">
                `;
                container.appendChild(item);
            });
        }

        function addNewLink() {
            const name = document.getElementById('new-name').value.trim();
            const url = document.getElementById('new-url').value.trim();
            if (!name) return showToast('이름을 입력하세요.');
            customLinks.push({ id: 'custom_' + Date.now(), name, url, color: 'gray', icon: 'default' });
            saveCustomLinks();
            document.getElementById('new-name').value = '';
            document.getElementById('new-url').value = '';
            renderSettings();
            showToast('추가 완료');
        }

        function updateLink(id, field, value) {
            const idx = customLinks.findIndex(l => l.id === id);
            if (idx !== -1) { customLinks[idx][field] = value; saveCustomLinks(); }
        }

        function deleteLink(id) {
            customLinks = customLinks.filter(l => l.id !== id);
            saveCustomLinks();
            renderSettings();
            showToast('삭제 완료');
        }

        function formatUrl(url) {
            let u = url.trim();
            if (u && !/^https?:\/\//i.test(u)) u = 'https://' + u;
            return u;
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.classList.remove('opacity-0', 'translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.add('opacity-0', 'translate-y-4');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
