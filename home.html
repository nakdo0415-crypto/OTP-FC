<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTP FC 통합 홈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모바일 터치 하이라이트 제거 및 스크롤바 숨김 */
        * { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <!-- 상단 헤더 -->
    <header class="bg-emerald-600 text-white p-4 shadow-md z-10 flex-shrink-0">
        <h1 class="text-xl font-bold text-center tracking-wide" id="header-title">OTP FC HOME</h1>
    </header>

    <!-- 메인 컨텐츠 영역 (스크롤 가능) -->
    <main class="flex-1 overflow-y-auto no-scrollbar relative w-full max-w-lg mx-auto bg-gray-50" id="main-content">
        
        <!-- ================= [홈 탭 뷰] ================= -->
        <div id="view-home" class="p-5 pb-24 hidden flex flex-col gap-4">
            <div class="mb-2">
                <h2 class="text-lg font-bold text-gray-700">시스템 바로가기</h2>
                <p class="text-sm text-gray-500">원하는 시스템을 선택하세요.</p>
            </div>
            
            <!-- 링크 버튼들이 생성될 컨테이너 -->
            <div id="link-buttons-container" class="grid grid-cols-1 gap-4">
                <!-- JS에서 동적 생성됨 -->
            </div>
        </div>

        <!-- ================= [설정 탭 뷰] ================= -->
        <div id="view-settings" class="p-5 pb-24 hidden flex flex-col gap-6">
            <div class="mb-2">
                <h2 class="text-lg font-bold text-gray-700">시스템 링크 설정</h2>
                <p class="text-sm text-gray-500">각 시스템의 Github Pages 주소를 등록하세요.</p>
            </div>

            <!-- 새 링크 추가 폼 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-semibold text-emerald-600 mb-3">새 시스템 등록</h3>
                <div class="flex flex-col gap-3">
                    <input type="text" id="new-name" placeholder="시스템 이름 (예: 출결 관리)" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                    <input type="url" id="new-url" placeholder="URL 링크 (https://...)" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                    <button onclick="addNewLink()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-lg transition-colors mt-1">
                        등록하기
                    </button>
                </div>
            </div>

            <!-- 등록된 링크 목록 -->
            <div>
                <h3 class="text-sm font-semibold text-gray-600 mb-3 ml-1">등록된 시스템 목록</h3>
                <div id="registered-links-container" class="flex flex-col gap-3">
                    <!-- JS에서 동적 생성됨 -->
                </div>
            </div>
        </div>

    </main>

    <!-- 하단 네비게이션 바 -->
    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full max-w-lg left-1/2 transform -translate-x-1/2 z-20 pb-safe">
        <div class="flex justify-around items-center h-16">
            <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center justify-center w-full h-full text-emerald-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span class="text-xs font-medium">홈</span>
            </button>
            <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-emerald-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="text-xs font-medium">설정</span>
            </button>
        </div>
    </nav>

    <!-- 모달 메세지 표시용 (Alert 대체) -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg text-sm transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        메세지
    </div>

    <script>
        // 초기 기본 링크 데이터
        const defaultLinks = [
            { id: 1, name: '출결 관리 시스템', url: '' },
            { id: 2, name: '명단 및 회비 관리', url: '' },
            { id: 3, name: '매치 테이블 관리', url: '' }
        ];

        // 앱 상태
        let links = [];
        let currentTab = 'home';

        // 앱 초기화
        function initApp() {
            const savedLinks = localStorage.getItem('otpfc_links');
            if (savedLinks) {
                try {
                    links = JSON.parse(savedLinks);
                } catch (e) {
                    links = JSON.parse(JSON.stringify(defaultLinks)); // 오류 시 기본값 복구
                }
            } else {
                // 원본을 훼손하지 않도록 깊은 복사 사용
                links = JSON.parse(JSON.stringify(defaultLinks));
                saveLinks();
            }
            switchTab('home');
        }

        // 데이터 저장
        function saveLinks() {
            localStorage.setItem('otpfc_links', JSON.stringify(links));
        }

        // 탭 전환 로직
        function switchTab(tab) {
            currentTab = tab;
            
            // 뷰 토글
            document.getElementById('view-home').classList.toggle('hidden', tab !== 'home');
            document.getElementById('view-settings').classList.toggle('hidden', tab !== 'settings');
            
            // 헤더 타이틀 변경
            document.getElementById('header-title').innerText = tab === 'home' ? 'OTP FC HOME' : '설정 (시스템 등록)';

            // 네비게이션 아이콘 색상 변경
            const navHome = document.getElementById('nav-home');
            const navSettings = document.getElementById('nav-settings');
            
            if (tab === 'home') {
                navHome.classList.replace('text-gray-400', 'text-emerald-600');
                navSettings.classList.replace('text-emerald-600', 'text-gray-400');
                renderHome();
            } else {
                navSettings.classList.replace('text-gray-400', 'text-emerald-600');
                navHome.classList.replace('text-emerald-600', 'text-gray-400');
                renderSettings();
            }
        }

        // 홈 화면 렌더링
        function renderHome() {
            const container = document.getElementById('link-buttons-container');
            container.innerHTML = '';

            if (links.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-300">
                        <p>등록된 시스템이 없습니다.</p>
                        <button onclick="switchTab('settings')" class="text-emerald-600 font-medium mt-2 underline">설정에서 추가하기</button>
                    </div>`;
                return;
            }

            links.forEach(link => {
                const isUrlEmpty = !link.url || link.url.trim() === '';
                
                const btn = document.createElement('button');
                btn.className = `w-full flex items-center justify-between p-5 rounded-2xl shadow-sm border transition-all active:scale-[0.98] ${
                    isUrlEmpty ? 'bg-gray-100 border-gray-200 opacity-60' : 'bg-white border-emerald-100 hover:border-emerald-300'
                }`;
                
                btn.onclick = () => {
                    if (isUrlEmpty) {
                        showToast('링크가 설정되지 않았습니다. 설정 탭에서 URL을 입력해주세요.');
                    } else {
                        // 실제 앱처럼 보이게 현재 창에서 이동
                        window.location.href = formatUrl(link.url);
                    }
                };

                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="${isUrlEmpty ? 'bg-gray-200 text-gray-400' : 'bg-emerald-100 text-emerald-600'} w-12 h-12 rounded-full flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="font-bold text-gray-800 text-lg">${link.name}</div>
                            <div class="text-xs text-gray-500 mt-1">${isUrlEmpty ? 'URL 미등록' : '입장하기 →'}</div>
                        </div>
                    </div>
                `;
                container.appendChild(btn);
            });
        }

        // 설정 화면 렌더링
        function renderSettings() {
            const container = document.getElementById('registered-links-container');
            container.innerHTML = '';

            links.forEach(link => {
                const item = document.createElement('div');
                item.className = 'bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-2';
                
                // 기존 onchange를 oninput으로 변경하여 글자를 입력/붙여넣기 할 때마다 즉시 저장되게 함
                item.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-semibold text-gray-800">${link.name}</span>
                        <button onclick="deleteLink(${link.id})" class="text-red-500 hover:bg-red-50 p-1 rounded transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                    <input type="text" value="${link.name}" oninput="updateLink(${link.id}, 'name', this.value)" class="w-full bg-gray-50 border border-gray-200 rounded md px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" placeholder="시스템 이름">
                    <input type="url" value="${link.url}" oninput="updateLink(${link.id}, 'url', this.value)" class="w-full bg-gray-50 border border-gray-200 rounded md px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 text-emerald-600" placeholder="URL을 입력하세요">
                `;
                container.appendChild(item);
            });
        }

        // 링크 추가 로직
        function addNewLink() {
            const nameInput = document.getElementById('new-name');
            const urlInput = document.getElementById('new-url');
            
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();

            if (!name) {
                showToast('시스템 이름을 입력해주세요.');
                return;
            }

            links.push({
                id: Date.now(),
                name: name,
                url: url
            });

            saveLinks();
            nameInput.value = '';
            urlInput.value = '';
            renderSettings();
            showToast('새 시스템이 등록되었습니다.');
        }

        // 링크 업데이트 로직 (실시간 반영)
        function updateLink(id, field, value) {
            const linkIndex = links.findIndex(l => l.id === id);
            if (linkIndex !== -1) {
                links[linkIndex][field] = value.trim();
                saveLinks(); // oninput 이벤트 덕분에 한 글자 칠 때마다 저장됩니다.
            }
        }

        // 링크 삭제 로직
        function deleteLink(id) {
            links = links.filter(l => l.id !== id);
            saveLinks();
            renderSettings();
            showToast('삭제되었습니다.');
        }

        // URL 포맷 헬퍼 (http가 없으면 붙여줌)
        function formatUrl(url) {
            let formattedUrl = url.trim();
            if (formattedUrl && !/^https?:\/\//i.test(formattedUrl)) {
                formattedUrl = 'https://' + formattedUrl;
            }
            return formattedUrl;
        }

        // 커스텀 토스트 알림
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 2500);
        }

        // 실행
        window.onload = initApp;
    </script>
</body>
</html>
