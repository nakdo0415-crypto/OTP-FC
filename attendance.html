                                <div className="grid grid-cols-2 sm:grid-cols-6 gap-2.5 text-left text-xs">
                                    {(() => {
                                        const currentPool = setupTabMonthlyMembers.length > 0 
                                            ? activeMembers.filter(m => setupTabMonthlyMembers.includes(m.id))
                                            : []; 

                                        if (currentPool.length === 0) {
                                            return (
                                                <div className="col-span-full py-12 text-center bg-slate-50 rounded-3xl border border-dashed border-slate-300">
                                                    <p className="text-slate-400 font-bold mb-2">월별 참여자 명단이 비어있습니다.</p>
                                                    <p className="text-xs text-slate-400">데이터베이스에 이번 달({meetingTimes.date.substring(0,7)}) 납부 내역이 등록되지 않았습니다.<br/>전체 명단 관리 시스템에서 결제 내역을 등록해주세요.</p>
                                                </div>
                                            );
                                        }

                                        return currentPool.sort((a,b)=>a.name.localeCompare(b.name)).map(m => {
                                            const participant = activeParticipants.find(p => p.memberId === m.id);
                                            const isSel = !!participant;
                                            const limit = meetingTimes.maxLimit || 18;
                                            
                                            let rankDisplay = null;
                                            let isWaiting = false;
                                            if (isSel) {
                                                const rank = activeParticipants.indexOf(participant) + 1;
                                                isWaiting = rank > limit;
                                                rankDisplay = isWaiting ? `대기 ${rank - limit}` : `NO.${rank}`;
                                            }

                                            return (
                                                <button key={m.id} onClick={() => toggleParticipant(m)} className={`p-4 h-24 rounded-2xl border-2 transition-all flex flex-col items-center justify-center relative active:scale-95 
                                                    ${isSel 
                                                        ? (isWaiting 
                                                            ? 'border-orange-400 bg-orange-50 shadow-md ring-2 ring-orange-200' 
                                                            : 'border-green-500 bg-green-50 shadow-md ring-2 ring-green-200') 
                                                        : 'bg-white border-slate-50 opacity-60'
                                                    } 
                                                    ${!isSel ? (m.gender === '남성' ? 'hover:border-blue-200' : 'hover:border-pink-200') : ''}`}>
                                                    
                                                    <span className={`font-black text-lg ${m.gender === '남성' ? 'text-blue-700' : 'text-pink-700'}`}>{m.name}</span>
                                                    <div className="flex gap-1 items-center mt-1 text-xs text-left">
                                                        <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-full border ${getPosColorClass(m.position)} shadow-sm`}>{m.position}</span>
                                                        <span className={`text-[9px] font-bold ${m.gender === '남성' ? 'text-blue-500' : 'text-pink-500'}`}>{m.gender}</span>
                                                    </div>
                                                    
                                                    {isSel && (
                                                        <div className={`absolute top-2 right-2 text-[9px] font-black px-1.5 py-0.5 rounded-full animate-zoom-in ${isWaiting ? 'bg-orange-200 text-orange-700' : 'bg-green-200 text-green-700'}`}>
                                                            {rankDisplay}
                                                        </div>
                                                    )}
                                                </button>
                                            );
                                        });
                                    })()}
                                </div>
                            </div>
                        )}

                        {/* ===================== 기록 뷰 ===================== */}
                        {view === 'history_list' && (
                            <div className="max-w-4xl mx-auto text-left text-xs">
                                {!selectedHistoryDetail ? (
                                    <>
                                        <h2 className="text-2xl font-black mb-6 flex items-center gap-2 px-2 text-slate-700 text-left"><Icon.History className="text-purple-600" /> 과거 기록 보관함</h2>
                                        <div className="space-y-3 text-left">
                                            {history.length === 0 ? <p className="text-center py-20 text-slate-400 font-black uppercase text-sm">No records found.</p> : history.map(h => (
                                                <button key={h.id} onClick={() => setSelectedHistoryDetail(h)} className="w-full flex items-center justify-between p-6 bg-white rounded-[24px] border border-slate-100 shadow-sm active:bg-slate-50 transition-all text-left">
                                                    <div className="text-left text-xs sm:text-sm text-left">
                                                        <p className="text-lg font-black text-slate-900">{h.date}</p>
                                                        <div className="flex flex-wrap items-center gap-2 mt-1">
                                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{h.meetingTime}</span><div className="w-px h-2 bg-slate-200" /><span className="text-[10px] font-bold text-blue-500">{h.location || "장소 미지정"}</span><div className="w-px h-2 bg-slate-200" /><span className="text-[10px] font-bold text-slate-900 uppercase">관리: {h.managerName || "미지정"}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3"><div className="text-right"><p className="text-xl font-black text-purple-600">{h.present}/{h.total}</p><p className="text-[9px] font-bold text-slate-300 uppercase font-black text-xs text-right">Presence</p></div><Icon.ChevronRight className="text-slate-200" /></div>
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="bg-white rounded-[40px] border border-slate-100 shadow-2xl overflow-hidden animate-zoom-in text-left" onClick={() => { setSelectedHistoryDetail(null); setIsEditingLocation(false); setIsEditingManager(false); }}>
                                        <div className="p-6 sm:p-8 bg-slate-900 text-white flex justify-between items-center" onClick={e => e.stopPropagation()}>
                                            <button onClick={() => { setSelectedHistoryDetail(null); setIsEditingLocation(false); setIsEditingManager(false); }} className="p-2.5 bg-white/10 rounded-xl hover:bg-white/20 transition-all shadow-none outline-none border-none"><Icon.ArrowLeft size={20} /></button>
                                            <div className="text-right flex flex-col items-end">
                                                <h3 className="text-xl sm:text-2xl font-black">{selectedHistoryDetail.date}</h3>
                                                <div className="flex items-center gap-1 mt-0.5">
                                                    <p className="text-[10px] font-bold opacity-50">{selectedHistoryDetail.meetingTime} | </p>
                                                    {isEditingLocation ? (
                                                        <div className="flex items-center gap-1">
                                                            <input 
                                                                type="text" 
                                                                className="bg-slate-800 text-white placeholder-slate-400 text-[10px] px-2 py-0.5 rounded border border-slate-600 outline-none w-24 text-right font-bold" 
                                                                value={editLocationValue} 
                                                                onChange={e => setEditLocationValue(e.target.value)} 
                                                                autoFocus
                                                                onClick={e => e.stopPropagation()}
                                                            />
                                                            <button onClick={(e) => { e.stopPropagation(); handleUpdateLocation(); }} className="text-blue-400 hover:text-blue-300 p-0.5"><Icon.Check size={12} /></button>
                                                            <button onClick={(e) => { e.stopPropagation(); setIsEditingLocation(false); }} className="text-red-400 hover:text-red-300 p-0.5"><Icon.RotateCcw size={12} /></button>
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-center gap-1 group cursor-pointer" onClick={(e) => { e.stopPropagation(); setEditLocationValue(selectedHistoryDetail.location || ''); setIsEditingLocation(true); }}>
                                                            <p className="text-[10px] font-bold opacity-50 group-hover:text-blue-300 transition-colors">{selectedHistoryDetail.location || "장소 미지정"}</p>
                                                            <Icon.Edit2 size={10} className="text-slate-500 group-hover:text-blue-300 transition-colors" />
                                                        </div>
                                                    )}
                                                </div>
                                                
                                                {isEditingManager ? (
                                                    <div className="flex items-center gap-1 mt-1 justify-end">
                                                        <span className="text-[10px] font-black text-blue-300 uppercase">Managed By: </span>

                                                            className="bg-slate-800 text-white text-[10px] py-0.5 rounded border border-slate-600 outline-none w-auto text-left font-bold pl-2 pr-6" 
                                                            value={editManagerValue} 
                                                            onChange={e => setEditManagerValue(e.target.value)} 
                                                            autoFocus
                                                            onClick={e => e.stopPropagation()}
                                                        >
                                                            <option value="미지정">선택 (미지정)</option>
                                                            {activeMembers.sort((a,b)=>a.name.localeCompare(b.name)).map(m => (
                                                                <option key={m.id} value={m.name}>{m.name} ({m.role})</option>
                                                            ))}
                                                        </select>
                                                        <button onClick={(e) => { e.stopPropagation(); handleUpdateManager(); }} className="text-blue-400 hover:text-blue-300 p-0.5"><Icon.Check size={12} /></button>
                                                        <button onClick={(e) => { e.stopPropagation(); setIsEditingManager(false); }} className="text-red-400 hover:text-red-300 p-0.5"><Icon.RotateCcw size={12} /></button>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center gap-1 group cursor-pointer mt-0.5 justify-end" onClick={(e) => { e.stopPropagation(); setEditManagerValue(selectedHistoryDetail.managerName || ''); setIsEditingManager(true); }}>
                                                        <p className="text-[10px] font-black text-blue-300 tracking-tighter uppercase">Managed By: {selectedHistoryDetail.managerName || "미지정"}</p>
                                                        <Icon.Edit2 size={10} className="text-slate-500 group-hover:text-blue-300 transition-colors" />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <div className="p-5 sm:p-6 text-left" onClick={e => e.stopPropagation()}>
                                            <div className="flex gap-2 mb-6 text-xs">
                                                <button onClick={() => setHistorySortKey('time')} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${historySortKey === 'time' ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>출석 시간순</button>
                                                <button onClick={() => { if (historySortKey === 'status') { setHistorySortOrder(prev => prev === 'asc' ? 'desc' : 'asc'); } else { setHistorySortKey('status'); setHistorySortOrder('asc'); } }} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${historySortKey === 'status' ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>출석 구분순 {historySortKey === 'status' && (historySortOrder === 'asc' ? '▲' : '▼')}</button>
                                                <button onClick={() => setIsPenaltyModalOpen(true)} className="flex-[0.7] py-3 rounded-xl font-black text-xs transition-all bg-rose-50 text-rose-500 hover:bg-rose-100 flex items-center justify-center gap-1 border-none"><Icon.Camera size={14} /> 벌금자</button>
                                            </div>
                                            <div className="space-y-2 max-h-[450px] overflow-y-auto pr-1 custom-scrollbar text-left text-xs">
                                                {sortedHistoryRecords.map((r, idx) => (
                                                    <div key={idx} className="flex items-center justify-between p-4 bg-slate-50 rounded-[20px] text-left">
                                                        <div className="flex items-center gap-3 text-left"><span className="font-black text-base text-slate-700">{r.name}</span><span className="text-[9px] font-black text-slate-400">{r.level}단</span><span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${getGenderPastelClass(r.gender)}`}>{r.gender}</span></div>
                                                        <div className="flex items-center gap-3 text-right">
                                                            <span className={`px-2 py-0.5 rounded-full text-[9px] font-black ${
                                                                r.status === '정상' ? 'bg-green-100 text-green-600' : 
                                                                r.status === '지각' ? 'bg-orange-100 text-orange-600' : 
                                                                r.status === '대기' ? 'bg-slate-200 text-slate-500' :
                                                                'bg-red-100 text-red-600'
                                                            }`}>{r.status}</span>
                                                            <span className="text-[10px] font-black text-slate-400 min-w-[55px] text-right">{r.checkInTime}</span>
                                                            
                                                            <button onClick={(e) => { e.stopPropagation(); setHistoryEditTarget({ docId: selectedHistoryDetail.id, recordIndex: r.originalIndex, currentStatus: r.status, name: r.name }); }} className="p-1.5 ml-1 text-slate-300 hover:text-blue-500 bg-slate-100 hover:bg-blue-50 rounded-lg transition-all">
                                                                <Icon.Edit2 size={12} />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={handleDeleteHistory} className="w-full mt-6 py-4 text-red-400 text-xs font-bold border-t border-slate-100 hover:text-red-600 transition-colors text-center shadow-none active:scale-95 transition-all border-none outline-none">데이터 영구 삭제</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    {/* 로그인 모달 */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[9000] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[48px] w-full max-w-md p-10 shadow-2xl animate-zoom-in text-center border-2 border-blue-50 relative">
                                
                                {/* ---------------- 로그인 화면 홈 버튼 추가 ---------------- */}
                                <button onClick={() => window.location.href = 'https://nakdo0415-crypto.github.io/OTP-FC/home.html'} className="absolute top-8 left-8 text-slate-300 hover:text-slate-500 transition-all bg-transparent border-none">
                                    <Icon.Home size={24} />
                                </button>

                                <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-blue-100 text-white"><Icon.ShieldCheck size={40} /></div>
                                <h2 className="text-3xl font-black text-slate-900 mb-2 tracking-tighter uppercase">Admin Login</h2>
                                <p className="text-slate-400 text-sm font-bold mb-8 tracking-widest uppercase text-xs text-center">운영진 전용 출석 시스템</p>
                                
                                <div className="space-y-6 mb-8 text-left">
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Select Manager</label>
                                        <div className="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto custom-scrollbar pr-1">
                                            {managers.length > 0 ? (
                                                managers.map(m => (
                                                    <button
                                                        key={m.id}
                                                        onClick={() => setLoginForm({ ...loginForm, name: m.name })}
                                                        className={`p-3 rounded-2xl border-2 transition-all flex flex-col items-center justify-center min-h-[70px] active:scale-95 ${
                                                            loginForm.name === m.name 
                                                            ? 'border-blue-500 bg-blue-50 text-blue-700 shadow-md ring-2 ring-blue-200 ring-offset-2' 
                                                            : 'border-slate-100 bg-slate-50 text-slate-500 hover:bg-slate-100 hover:border-slate-200'
                                                        }`}
                                                    >
                                                        <span className="font-black text-sm">{m.name}</span>
                                                        <span className="text-[10px] font-bold opacity-70 mt-0.5">{m.role}</span>
                                                    </button>
                                                ))
                                            ) : (
                                                <div className="col-span-2 py-4 text-center text-xs text-slate-400 font-bold bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                                                    등록된 운영진이 없습니다.
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <button 
                                    onClick={handleLogin} 
                                    disabled={!loginForm.name}
                                    className={`w-full py-5 rounded-3xl font-black text-xl shadow-xl transition-all uppercase text-center ${
                                        loginForm.name 
                                        ? 'bg-blue-600 text-white shadow-blue-100 hover:bg-blue-700 active:scale-95' 
                                        : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                    }`}
                                >
                                    Login
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 비밀번호 변경 모달 */}
                    {isPasswordChangeModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[6000] flex items-center justify-center p-4" onClick={() => setIsPasswordChangeModalOpen(false)}>
                            <div className="bg-white rounded-[48px] w-full max-w-sm p-10 shadow-2xl animate-zoom-in text-left text-xs" onClick={e => e.stopPropagation()}>
                                <h2 className="text-2xl font-black mb-8 text-blue-600 tracking-tighter uppercase text-left">Change Password</h2>
                                <div className="space-y-4 mb-10 text-left text-xs">
                                    <div className="flex flex-col gap-1 text-left"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Current</label><input type="password" placeholder="현재 비밀번호" className="p-4 bg-slate-50 rounded-2xl font-black outline-none border-2 border-transparent focus:border-blue-100 shadow-none text-xs" value={passwordForm.current} onChange={e => setPasswordForm({...passwordForm, current: e.target.value})} /></div>
                                    <div className="flex flex-col gap-1 text-left"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase">New</label><input type="password" placeholder="새 비밀번호" className="p-4 bg-slate-50 rounded-2xl font-black outline-none border-2 border-transparent focus:border-blue-100 shadow-none text-xs" value={passwordForm.next} onChange={e => setPasswordForm({...passwordForm, next: e.target.value})} /></div>
                                    <div className="flex flex-col gap-1 text-left"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Confirm</label><input type="password" placeholder="확인 입력" className="p-4 bg-slate-50 rounded-2xl font-black outline-none border-2 border-transparent focus:border-blue-100 shadow-none text-xs" value={passwordForm.confirm} onChange={e => setPasswordForm({...passwordForm, confirm: e.target.value})} /></div>
                                </div>
                                <div className="flex gap-3 text-left text-xs"><button onClick={() => setIsPasswordChangeModalOpen(false)} className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-3xl font-black shadow-none active:scale-95 transition-all border-none outline-none text-xs uppercase text-center">취소</button><button onClick={handlePasswordChange} className="flex-1 py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl active:scale-95 transition-all uppercase text-xs text-center">Apply</button></div>
                            </div>
                        </div>
                    )}

                    {/* 전체 관리자 선택 모달 */}
                    {isManagerSelectorOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[600] flex items-center justify-center p-4" onClick={() => setIsManagerSelectorOpen(false)}>
                            <div className="bg-white rounded-[48px] w-full max-w-2xl p-10 shadow-2xl animate-zoom-in text-left flex flex-col max-h-[80vh] text-left" onClick={e => e.stopPropagation()}>
                                <h2 className="text-2xl font-black mb-6 text-blue-600 tracking-tighter uppercase text-left">Pick Manager</h2>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 overflow-y-auto pr-2 custom-scrollbar flex-1 mb-8 text-left text-xs">
                                    {activeMembers.sort((a,b)=>a.name.localeCompare(b.name)).map(m => (
                                        <button key={m.id} onClick={() => { updateMeetingTimeSettings({...meetingTimes, managerId: m.id, managerName: m.name}); setIsManagerSelectorOpen(false); }} className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center justify-center ${meetingTimes.managerId === m.id ? 'border-blue-600 bg-blue-50' : 'bg-white border-slate-100 hover:border-blue-200 shadow-sm'}`}><span className="font-black text-slate-800 text-left">{m.name}</span><span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest text-xs text-left">{m.role}</span></button>
                                    ))}
                                </div>
                                <div className="flex gap-3 mt-auto"><button onClick={() => setIsManagerSelectorOpen(false)} className="w-full py-5 bg-slate-100 text-slate-500 rounded-3xl font-black text-center shadow-none active:scale-95 transition-all border-none outline-none text-xs text-center">닫기</button></div>
                            </div>
                        </div>
                    )}

                    {/* 게스트 추가 모달 */}
                    {isGuestModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[600] flex items-center justify-center p-4" onClick={() => setIsGuestModalOpen(false)}>
                            <div className="bg-white rounded-[48px] w-full max-w-md p-10 shadow-2xl animate-zoom-in text-left text-xs sm:text-sm" onClick={e => e.stopPropagation()}>
                                <h2 className="text-2xl font-black mb-8 text-blue-600 tracking-tighter uppercase">Add Guest</h2>
                                <div className="space-y-5 mb-8 text-left text-xs">
                                    <div className="flex flex-col gap-1 text-left text-xs"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase text-xs">Name</label><input type="text" className="p-4 bg-slate-50 rounded-2xl font-black border-2 border-transparent focus:border-blue-100 outline-none shadow-none" value={newGuest.name} onChange={e=>setNewGuest({...newGuest, name: e.target.value})} placeholder="이름 입력" /></div>
                                    <div className="flex flex-col gap-1 text-left text-xs"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase text-xs">Gender</label><select className="p-4 bg-slate-50 rounded-2xl font-black border-2 border-transparent focus:border-blue-100 outline-none shadow-none text-xs" value={newGuest.gender} onChange={e=>setNewGuest({...newGuest, gender: e.target.value, level: e.target.value === '남성' ? '1' : '7'})}><option>남성</option><option>여성</option></select></div>
                                    <div className="flex flex-col gap-1 text-left text-xs"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase text-xs">Level</label><select className="p-4 bg-slate-50 rounded-2xl font-black border-2 border-transparent focus:border-blue-100 outline-none shadow-none text-xs" value={newGuest.level} onChange={e=>setNewGuest({...newGuest, level: e.target.value})}>{newGuest.gender === '남성' ? [1,2,3,4,5,6].map(v => <option key={v} value={String(v)}>{v}단계</option>) : [7,8,9,10,11,12].map(v => <option key={v} value={String(v)}>{v}단계</option>)}</select></div>
                                    <div className="flex flex-col gap-1 text-left text-xs"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase text-xs">Inviter</label><select className="p-4 bg-slate-50 rounded-2xl font-black border-2 border-transparent focus:border-blue-100 outline-none shadow-none text-xs" value={newGuest.inviterId} onChange={e=>setNewGuest({...newGuest, inviterId: e.target.value})}><option value="">없음</option>{activeMembers.sort((a,b)=>a.name.localeCompare(b.name)).map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
                                </div>
                                <div className="flex gap-3"><button onClick={() => setIsGuestModalOpen(false)} className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-3xl font-black shadow-none active:scale-95 transition-all border-none outline-none">취소</button><button onClick={handleAddGuest} className="flex-1 py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl active:scale-95 transition-all shadow-blue-100 uppercase text-xs">Add</button></div>
                            </div>
                        </div>
                    )}

                    {/* History Status Edit Modal */}
                    {historyEditTarget && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[7000] flex items-center justify-center p-4" onClick={() => setHistoryEditTarget(null)}>
                            <div className="bg-white rounded-[40px] w-full max-w-sm p-8 shadow-2xl animate-zoom-in text-center" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-black text-slate-900 mb-2">{historyEditTarget.name}</h3>
                                <p className="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest">Change Attendance Status</p>
                                <div className="grid grid-cols-2 gap-2">
                                    {['정상', '지각', '노쇼', '대기', '미출석'].map(status => (
                                        <button 
                                            key={status} 
                                            onClick={() => handleHistoryStatusUpdate(status)}
                                            className={`py-3 rounded-xl font-black text-sm transition-all ${
                                                historyEditTarget.currentStatus === status 
                                                ? 'bg-slate-900 text-white shadow-lg' 
                                                : 'bg-slate-50 text-slate-500 hover:bg-slate-100'
                                            }`}
                                        >
                                            {status}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setHistoryEditTarget(null)} className="mt-4 w-full py-3 text-slate-400 font-bold text-xs">취소</button>
                            </div>
                        </div>
                    )}

                    {/* Penalty Capture Modal */}
                    {isPenaltyModalOpen && selectedHistoryDetail && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[8000] flex items-center justify-center p-4" onClick={() => setIsPenaltyModalOpen(false)}>
                            <div className="bg-white rounded-[40px] w-full max-w-sm p-6 shadow-2xl animate-zoom-in text-center flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 px-2">
                                    <h3 className="text-lg font-black text-slate-900">지각/노쇼 리스트</h3>
                                    <button onClick={handleCapturePenalty} className="flex items-center gap-1 px-4 py-2 bg-blue-600 text-white rounded-xl font-bold text-xs shadow-md shadow-blue-100 active:scale-95 transition-all border-none">
                                        <Icon.Camera size={14} /> 캡쳐
                                    </button>
                                </div>
                                
                                <div className="overflow-y-auto custom-scrollbar pr-2 pb-4 flex-1">
                                    <div id="penalty-capture-area" className="bg-slate-50 rounded-[32px] p-6 border border-slate-100">
                                        <div className="text-center mb-6">
                                            <h4 className="text-2xl font-black text-[#db2777] uppercase tracking-tighter">OTP FC</h4>
                                            <p className="text-xs font-bold text-slate-500 mt-1">{selectedHistoryDetail.date}</p>
                                            <p className="text-[10px] font-bold text-slate-400 mt-0.5">{selectedHistoryDetail.location || "장소 미지정"}</p>
                                        </div>
                                        
                                        <div className="space-y-3">
                                            {(() => {
                                                const penaltyList = selectedHistoryDetail.records.filter(r => r.status === '지각' || r.status === '노쇼');
                                                penaltyList.sort((a, b) => {
                                                    if (a.status !== b.status) return a.status === '노쇼' ? -1 : 1;
                                                    return a.name.localeCompare(b.name);
                                                });
                                                
                                                if (penaltyList.length === 0) {
                                                    return <p className="text-slate-400 font-bold py-10 text-center text-sm">해당 모임에 지각/노쇼자가 없습니다 🎉</p>;
                                                }
                                                
                                                return penaltyList.map((p, i) => (
                                                    <div key={i} className="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm text-left">
                                                        <span className="font-black text-sm text-slate-700">{p.name}</span>
                                                        <span className={`px-2.5 py-1 rounded-full text-[10px] font-black ${p.status === '노쇼' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'}`}>
                                                            {p.status} {p.status === '지각' && p.checkInTime !== '미출석' ? `(${p.checkInTime})` : ''}
                                                        </span>
                                                    </div>
                                                ));
                                            })()}
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => setIsPenaltyModalOpen(false)} className="mt-2 w-full py-4 text-slate-400 font-bold text-xs bg-slate-100 rounded-2xl active:scale-95 transition-all border-none">닫기</button>
                            </div>
                        </div>
                    )}

                    {/* System Lock Modal */}
                    {lockModalMode && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[300] flex items-center justify-center p-4" onClick={() => setLockModalMode(null)}>
                            <div className="bg-white rounded-[48px] w-full max-w-sm p-10 shadow-2xl text-center" onClick={e => e.stopPropagation()}>
                                <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-8 text-slate-900 shadow-inner">{lockModalMode === 'set' ? <Icon.Lock size={36} /> : <Icon.Unlock size={36} />}</div>
                                <h3 className="text-2xl font-black mb-2 tracking-tighter text-center uppercase">System Lock</h3>
                                <input type="password" inputMode="numeric" placeholder="비밀번호" className="w-full p-5 bg-slate-50 rounded-3xl font-black text-center text-3xl mb-8 border-2 border-transparent focus:border-blue-500 transition-all outline-none shadow-none" value={tempPassword} onChange={e => setTempPassword(e.target.value)} autoFocus />
                                <div className="flex gap-3"><button onClick={() => setLockModalMode(null)} className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-3xl font-black shadow-none active:scale-95 transition-all border-none outline-none">취소</button><button onClick={lockModalMode === 'set' ? confirmLock : confirmUnlock} className="flex-1 py-5 bg-slate-900 text-white rounded-3xl font-black shadow-xl active:scale-95 transition-all shadow-slate-200 uppercase">{lockModalMode === 'set' ? 'Start Lock' : 'Unlock'}</button></div>
                            </div>
                        </div>
                    )}

                    {/* Alert Modal */}
                    {alertModal.show && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[9999] flex items-center justify-center p-4" onClick={() => setAlertModal(p => ({...p, show: false}))}>
                            <div className="bg-white rounded-[48px] w-full max-w-sm p-10 shadow-2xl text-center animate-zoom-in" onClick={e => e.stopPropagation()}>
                                <h3 className="text-2xl font-black mb-4 tracking-tighter text-center uppercase text-slate-900 text-center">{alertModal.title}</h3>
                                <p className="text-slate-500 font-bold mb-10 whitespace-pre-wrap leading-relaxed text-sm text-center">{alertModal.content}</p>
                                <div className="flex gap-3 text-center">
                                    {alertModal.type === 'confirm' && <button onClick={() => setAlertModal(p => ({...p, show: false}))} className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-3xl font-black active:scale-95 transition-all shadow-none border-none outline-none uppercase text-xs text-center">No</button>}
                                    <button onClick={() => { if (alertModal.onConfirm) alertModal.onConfirm(); setAlertModal(p => ({...p, show: false})); }} className={`flex-1 py-5 text-white rounded-3xl font-black shadow-xl active:scale-95 transition-all ${alertModal.type === 'confirm' ? 'bg-blue-600 shadow-blue-100' : 'bg-slate-900 shadow-slate-200'} uppercase text-xs text-center`}>Yes</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Check In Modal */}
                    {modal.type === 'check' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4" onClick={() => setModal({type:null, data:null})}>
                            <div className="bg-white rounded-[48px] w-full max-w-sm p-10 text-center shadow-2xl animate-zoom-in" onClick={e => e.stopPropagation()}>
                                <h2 className="text-4xl font-black text-slate-900 mb-10 tracking-tighter text-center">{modal.data.name.replace('(G)', '')} 님</h2>
                                <button onClick={() => handleCheckIn(modal.data)} className="w-full bg-blue-600 text-white py-8 rounded-[32px] text-2xl font-black shadow-xl text-center shadow-blue-100 active:scale-95 transition-all uppercase text-center">Check In</button>
                                <button onClick={() => setModal({type:null, data:null})} className="mt-4 text-slate-400 font-bold text-sm w-full text-center active:scale-95 transition-all shadow-none border-none outline-none uppercase text-center">Close</button>
                            </div>
                        </div>
                    )}

                    {/* Cancel Attendance Modal */}
                    {modal.type === 'cancel' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4" onClick={() => setModal({type:null, data:null})}>
                            <div className="bg-white rounded-[48px] w-full max-w-sm p-10 text-center animate-zoom-in shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h2 className="text-3xl font-black mb-4 tracking-tighter text-center">{modal.data.name.replace('(G)', '')} 님</h2>
                                <p className="mb-10 text-slate-400 font-bold italic text-center text-sm">출석 기록을 취소하시겠습니까?</p>
                                <button onClick={async () => { try { await getSessionCol().doc(modal.data.id).update({ checkedIn: false, checkInTime: null, status: '미출석' }); setModal({ type: null, data: null }); } catch(e) { console.error(e); } }} className="w-full bg-red-500 text-white py-6 rounded-3xl text-xl font-black shadow-xl text-center active:scale-95 transition-all shadow-rose-100 uppercase text-center">Cancel Attendance</button>
                                <button onClick={() => setModal({type:null, data:null})} className="mt-3 text-slate-400 font-bold text-sm w-full text-center active:scale-95 transition-all shadow-none border-none outline-none uppercase text-center">Back</button>
                            </div>
                        </div>
                    )}
                    
                    {/* App Locked Modal */}
                    {isAppLocked && (
                        <>
                            {/* ---------------- 잠금 화면 홈 버튼 추가 ---------------- */}
                            <button 
                                onClick={() => window.location.href = 'https://nakdo0415-crypto.github.io/OTP-FC/home.html'} 
                                className="fixed top-5 left-5 sm:top-8 sm:left-8 w-14 h-14 bg-white/90 backdrop-blur text-slate-500 rounded-full shadow-2xl flex items-center justify-center border border-slate-200 z-[9999] active:scale-90 transition-all shadow-slate-100 safe-pt"
                            >
                                <Icon.Home size={24} />
                            </button>

                            <button 
                                onClick={handleLockToggle} 
                                className="fixed top-5 right-5 sm:top-8 sm:right-8 w-14 h-14 bg-white/90 backdrop-blur text-slate-500 rounded-full shadow-2xl flex items-center justify-center border border-slate-200 z-[9999] active:scale-90 transition-all shadow-blue-100 safe-pt"
                            >
                                <Icon.Unlock size={24} />
                            </button>
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
