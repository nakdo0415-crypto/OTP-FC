<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8fafc">
    
    <title>OTP FC 미디어 갤러리</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Esamanru', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Firestore + Storage 추가) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    
    <style>
        @font-face {
            font-family: 'Esamanru';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicMedium.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Esamanru';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicBold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Esamanru';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicLight.woff') format('woff');
            font-weight: 300;
            font-style: normal;
        }

        body { 
            font-family: 'Esamanru', sans-serif !important;
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
            user-select: none;
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            height: 100%;
        }

        .animate-zoom-in { animation: zoomIn 0.2s ease-out; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        select, input, textarea { outline: none; transition: border-color 0.2s; }
        select:focus, input:focus, textarea:focus { border-color: #3b82f6 !important; }

        /* 비디오 플레이어 숨김처리 조정 */
        video::-webkit-media-controls-panel { background-image: linear-gradient(transparent, transparent) !important; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-slate-500 italic">서버 연결 중...</p>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const STAFF_ROLES = ['회장', '매니저', '총무', '부총무'];

        // 기존 시스템 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCAcQzliuWJTB8vPm9gb0vsyR8pIAx7YTw",
            authDomain: "otp-fc-check.firebaseapp.com",
            projectId: "otp-fc-check",
            storageBucket: "otp-fc-check.firebasestorage.app",
            messagingSenderId: "907414776392",
            appId: "1:907414776392:web:0a29a660bb956e5a40467d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        const APP_ID = 'otp-fc-attendance';

        // Collections
        const getCol = (name) => db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection(name);
        const getMemberCol = () => getCol('members');
        const getGalleryCol = () => getCol('gallery_posts');

        // Icons
        const Icon = {
            Home: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            LogOut: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            User: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            ArrowLeft: ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Heart: ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
            HeartFill: ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
            MessageCircle: ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
            Upload: ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            PlayCircle: ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>,
            Trash: ({size=16, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Send: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            Image: ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        };

        function App() {
            // States
            const [view, setView] = useState('gallery'); // 'gallery' | 'upload' | 'detail'
            const [members, setMembers] = useState([]);
            const [posts, setPosts] = useState([]);
            const [currentPost, setCurrentPost] = useState(null);
            const [comments, setComments] = useState([]);

            const [loggedInUser, setLoggedInUser] = useState(() => {
                try {
                    const stored = localStorage.getItem('otp_gallery_user');
                    return stored ? JSON.parse(stored) : null;
                } catch (e) { return null; }
            });

            const [isLoginModalOpen, setIsLoginModalOpen] = useState(!loggedInUser);
            const [loginForm, setLoginForm] = useState({ name: '', password: '' });
            const [alertModal, setAlertModal] = useState({ show: false, title: '', content: '', type: 'info', onConfirm: null });

            // Upload States
            const [uploadFile, setUploadFile] = useState(null);
            const [uploadTitle, setUploadTitle] = useState('');
            const [uploadDesc, setUploadDesc] = useState('');
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);

            // Comment State
            const [newComment, setNewComment] = useState('');
            const commentsEndRef = useRef(null);

            const activeMembers = useMemo(() => members.filter(m => !m.isResigned), [members]);
            const isManager = loggedInUser && STAFF_ROLES.includes(loggedInUser.role);

            // Fetch Data
            useEffect(() => {
                const initAuth = async () => {
                    const timeout = setTimeout(() => {
                         const loader = document.getElementById('loading-screen');
                         if(loader) loader.style.opacity = '0';
                         setTimeout(() => { if(loader) loader.style.display = 'none'; }, 500);
                    }, 1000); 

                    try { 
                        await auth.signInAnonymously(); 
                    } catch (e) { console.error(e); } 
                    finally {
                        clearTimeout(timeout);
                        const loader = document.getElementById('loading-screen');
                        if(loader) {
                            loader.style.opacity = '0';
                            setTimeout(() => { loader.style.display = 'none'; }, 500);
                        }
                    }
                };
                initAuth();
                
                const unsubAuth = auth.onAuthStateChanged(u => {
                    if (u) {
                        // Fetch Members
                        getMemberCol().onSnapshot(snap => setMembers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                        
                        // Fetch Posts
                        getGalleryCol().orderBy('createdAt', 'desc').onSnapshot(snap => {
                            setPosts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                    }
                });
                return () => unsubAuth();
            }, []);

            // Scroll to bottom of comments when comments load
            useEffect(() => {
                if (view === 'detail' && commentsEndRef.current) {
                    commentsEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [comments, view]);

            const showAlert = (title, content, type = 'info', onConfirm = null) => setAlertModal({ show: true, title, content, type, onConfirm });
            const showConfirm = (title, content, onConfirm) => setAlertModal({ show: true, title, content, type: 'confirm', onConfirm });

            // Login Handlers
            const handleLogin = () => {
                if (!loginForm.name.trim()) return showAlert("알림", "이름을 입력해주세요.");
                if (!loginForm.password.trim()) return showAlert("알림", "비밀번호를 입력해주세요.");
                
                const user = members.find(m => m.name === loginForm.name.trim());
                if (!user) return showAlert("오류", "등록된 회원이 아닙니다.");
                
                const defaultPassword = user.birth ? user.birth.substring(2, 8) : "000000";
                const currentStored = user.password || defaultPassword;
                
                if (loginForm.password !== currentStored) {
                    return showAlert("오류", "비밀번호가 일치하지 않습니다.");
                }
                
                localStorage.setItem('otp_gallery_user', JSON.stringify(user));
                setLoggedInUser(user);
                setIsLoginModalOpen(false);
                setLoginForm({ name: '', password: '' });
                showAlert("환영합니다", `${user.name} 님 환영합니다!`);
            };

            const handleLogout = () => {
                localStorage.removeItem('otp_gallery_user');
                setLoggedInUser(null);
                setIsLoginModalOpen(true);
            };

            // Post Detail & Comments
            const openPostDetail = (post) => {
                setCurrentPost(post);
                setView('detail');
                // Fetch Comments
                getGalleryCol().doc(post.id).collection('comments').orderBy('createdAt', 'asc').onSnapshot(snap => {
                    setComments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            };

            // Add Comment
            const handleAddComment = async (e) => {
                e.preventDefault();
                if (!newComment.trim() || !loggedInUser || !currentPost) return;

                const commentText = newComment.trim();
                setNewComment(''); // Optimistic clear

                try {
                    await getGalleryCol().doc(currentPost.id).collection('comments').add({
                        text: commentText,
                        authorId: loggedInUser.id,
                        authorName: loggedInUser.name,
                        createdAt: new Date().toISOString()
                    });
                } catch (e) {
                    showAlert("오류", "댓글 작성 실패");
                }
            };

            // Delete Comment
            const handleDeleteComment = (commentId, authorId) => {
                if(loggedInUser.id !== authorId && !isManager) return;
                showConfirm("삭제", "이 댓글을 삭제하시겠습니까?", async () => {
                    try {
                        await getGalleryCol().doc(currentPost.id).collection('comments').doc(commentId).delete();
                    } catch (e) {
                        showAlert("오류", "삭제 실패");
                    }
                });
            };

            // Delete Post
            const handleDeletePost = (post) => {
                if(!isManager && loggedInUser.id !== post.uploaderId) return;
                showConfirm("게시물 삭제", "정말 이 게시물을 삭제하시겠습니까?", async () => {
                    try {
                        await getGalleryCol().doc(post.id).delete();
                        setView('gallery');
                        setCurrentPost(null);
                        showAlert("완료", "게시물이 삭제되었습니다.");
                    } catch (e) {
                        showAlert("오류", "삭제 실패");
                    }
                });
            };

            // Toggle Like
            const toggleLike = async (post, e) => {
                if(e) e.stopPropagation();
                if(!loggedInUser) return;
                
                const postRef = getGalleryCol().doc(post.id);
                const isLiked = post.likes && post.likes.includes(loggedInUser.id);

                try {
                    if (isLiked) {
                        await postRef.update({ likes: firebase.firestore.FieldValue.arrayRemove(loggedInUser.id) });
                    } else {
                        await postRef.update({ likes: firebase.firestore.FieldValue.arrayUnion(loggedInUser.id) });
                    }
                } catch (e) {
                    console.error("좋아요 오류:", e);
                }
            };

            // Upload File Logic
            const handleUpload = async () => {
                if (!uploadFile) return showAlert("알림", "파일을 선택해주세요.");
                if (!uploadTitle.trim()) return showAlert("알림", "제목을 입력해주세요.");
                
                setIsUploading(true);
                setUploadProgress(0);

                const fileExt = uploadFile.name.split('.').pop();
                const fileName = `gallery/${Date.now()}_${loggedInUser.id}.${fileExt}`;
                const storageRef = storage.ref().child(fileName);
                const isVideo = uploadFile.type.startsWith('video/');

                const uploadTask = storageRef.put(uploadFile);

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        setUploadProgress(progress);
                    }, 
                    (error) => {
                        console.error(error);
                        showAlert("오류", "파일 업로드에 실패했습니다.");
                        setIsUploading(false);
                    }, 
                    async () => {
                        try {
                            const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                            await getGalleryCol().add({
                                type: isVideo ? 'video' : 'image',
                                mediaUrl: downloadURL,
                                title: uploadTitle,
                                description: uploadDesc,
                                uploaderId: loggedInUser.id,
                                uploaderName: loggedInUser.name,
                                createdAt: new Date().toISOString(),
                                likes: []
                            });
                            
                            showAlert("업로드 성공", "게시물이 등록되었습니다.");
                            setUploadFile(null);
                            setUploadTitle('');
                            setUploadDesc('');
                            setIsUploading(false);
                            setView('gallery');
                        } catch (e) {
                            console.error(e);
                            showAlert("오류", "데이터베이스 저장 실패");
                            setIsUploading(false);
                        }
                    }
                );
            };

            const formatDate = (isoString) => {
                const date = new Date(isoString);
                return `${date.getFullYear().toString().slice(2)}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
            };


            return (
                <div className="min-h-screen pb-10 text-slate-900 bg-slate-50 flex flex-col">
                    {/* 네비게이션 헤더 */}
                    {!isLoginModalOpen && (
                        <nav className="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 h-16 sm:h-20 flex items-center px-4 shadow-sm text-slate-900 transition-all flex-none">
                            <div className="max-w-5xl mx-auto w-full flex justify-between items-center text-left">
                                <div className="flex items-center gap-1 sm:gap-2">
                                    <button onClick={() => window.location.href = 'https://nakdo0415-crypto.github.io/OTP-FC/home.html'} className="p-2.5 mr-1 sm:mr-2 rounded-xl transition-all bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center shadow-none border-none">
                                        <Icon.Home size={18} />
                                    </button>
                                    
                                    <button onClick={() => { setView('gallery'); setCurrentPost(null); }} className={`px-4 sm:px-6 py-2.5 rounded-xl font-black text-sm sm:text-base transition-all flex items-center gap-2 ${view === 'gallery' ? 'bg-slate-900 text-white shadow-lg shadow-slate-200' : 'text-slate-400 hover:text-slate-600'}`}>
                                        GALLERY
                                    </button>
                                </div>
                                <div className="flex items-center gap-2 sm:gap-3">
                                    {isManager && (
                                        <button onClick={() => setView('upload')} className={`hidden sm:flex px-4 py-2.5 rounded-xl font-black text-xs sm:text-sm transition-all flex items-center gap-2 ${view === 'upload' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`}>
                                            <Icon.Upload size={16} /> 업로드
                                        </button>
                                    )}
                                    {isManager && (
                                        <button onClick={() => setView('upload')} className={`sm:hidden p-2.5 rounded-xl transition-all ${view === 'upload' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`}>
                                            <Icon.Upload size={18} />
                                        </button>
                                    )}

                                    {loggedInUser && (
                                        <div className="flex items-center gap-2 pl-2 border-l border-slate-200 ml-1">
                                            <span className="hidden sm:block text-xs font-black text-slate-600 bg-slate-100 px-3 py-1.5 rounded-lg">{loggedInUser.name}</span>
                                            <button onClick={handleLogout} className="p-2.5 rounded-xl bg-red-50 text-red-500 hover:bg-red-100 transition-all shadow-none border-none"><Icon.LogOut size={18} /></button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </nav>
                    )}

                    {/* 메인 콘텐츠 영역 */}
                    <main className="flex-1 w-full max-w-5xl mx-auto p-4 sm:p-6 flex flex-col">
                        
                        {/* ===================== 갤러리 뷰 ===================== */}
                        {view === 'gallery' && !isLoginModalOpen && (
                            <div className="animate-zoom-in">
                                <div className="mb-6 flex items-center justify-between px-2">
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tighter uppercase">Media Gallery</h2>
                                    <span className="text-xs font-bold text-slate-400 bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100">{posts.length} Posts</span>
                                </div>
                                
                                {posts.length === 0 ? (
                                    <div className="py-20 flex flex-col items-center justify-center text-slate-300">
                                        <Icon.Image size={48} className="mb-4 opacity-50" />
                                        <p className="font-bold text-sm">등록된 사진이나 영상이 없습니다.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 sm:gap-4">
                                        {posts.map(post => {
                                            const isLiked = loggedInUser && post.likes && post.likes.includes(loggedInUser.id);
                                            return (
                                                <div key={post.id} onClick={() => openPostDetail(post)} className="group cursor-pointer relative aspect-square bg-slate-200 rounded-[24px] sm:rounded-[32px] overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border border-slate-100">
                                                    
                                                    {post.type === 'image' ? (
                                                        <img src={post.mediaUrl} alt={post.title} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" />
                                                    ) : (
                                                        <div className="w-full h-full relative bg-slate-900">
                                                            <video src={post.mediaUrl} className="w-full h-full object-cover opacity-80" muted playsInline />
                                                            <div className="absolute inset-0 flex items-center justify-center text-white/80 group-hover:text-white group-hover:scale-110 transition-all"><Icon.PlayCircle size={40} /></div>
                                                        </div>
                                                    )}
                                                    
                                                    {/* 호버/정보 오버레이 */}
                                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                                                        <p className="text-white font-black text-sm truncate">{post.title}</p>
                                                        <div className="flex items-center justify-between mt-1">
                                                            <span className="text-white/70 text-[10px] font-bold">{post.uploaderName}</span>
                                                            <div className="flex items-center gap-1 text-white text-xs font-bold">
                                                                <Icon.HeartFill size={12} className={isLiked ? "text-rose-500" : "text-white/50"} /> {post.likes ? post.likes.length : 0}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    
                                                    {/* 상단 뱃지 (비디오 아이콘 등) */}
                                                    {post.type === 'video' && (
                                                        <div className="absolute top-3 right-3 bg-black/50 backdrop-blur px-2 py-1 rounded-full text-white">
                                                            <Icon.PlayCircle size={14} />
                                                        </div>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ===================== 업로드 뷰 ===================== */}
                        {view === 'upload' && isManager && (
                            <div className="max-w-xl mx-auto w-full animate-slide-up bg-white p-6 sm:p-10 rounded-[40px] shadow-2xl border border-slate-100">
                                <div className="flex items-center justify-between mb-8">
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tighter uppercase">New Upload</h2>
                                    <button onClick={() => setView('gallery')} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full"><Icon.ArrowLeft size={18}/></button>
                                </div>

                                <div className="space-y-6">
                                    <div className="flex flex-col gap-2">
                                        <label className="text-xs font-black text-slate-500 ml-1 uppercase">Media File</label>
                                        <label className="flex flex-col items-center justify-center w-full h-48 border-2 border-slate-200 border-dashed rounded-[32px] cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-300 transition-all overflow-hidden relative group">
                                            {uploadFile ? (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center bg-white p-4">
                                                    <div className="text-blue-500 mb-2">{uploadFile.type.startsWith('video') ? <Icon.PlayCircle size={40}/> : <Icon.Image size={40}/>}</div>
                                                    <p className="text-sm font-black text-slate-700 text-center truncate w-full px-4">{uploadFile.name}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold mt-1">{(uploadFile.size / (1024*1024)).toFixed(2)} MB</p>
                                                    <div className="absolute inset-0 bg-black/50 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all font-bold text-sm">클릭하여 변경</div>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center justify-center pt-5 pb-6 text-slate-400 group-hover:text-blue-500 transition-colors">
                                                    <Icon.Upload size={36} className="mb-3" />
                                                    <p className="mb-1 text-sm font-black">사진 또는 영상 선택</p>
                                                    <p className="text-xs font-bold opacity-70">클릭하여 파일을 탐색하세요</p>
                                                </div>
                                            )}
                                            <input type="file" className="hidden" accept="image/*,video/*" onChange={e => {
                                                if(e.target.files && e.target.files[0]) setUploadFile(e.target.files[0]);
                                            }} />
                                        </label>
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-xs font-black text-slate-500 ml-1 uppercase">Title</label>
                                        <input type="text" value={uploadTitle} onChange={e => setUploadTitle(e.target.value)} placeholder="게시물 제목" className="w-full p-4 bg-slate-50 rounded-2xl font-black border-2 border-transparent focus:border-blue-300 outline-none transition-all" />
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-xs font-black text-slate-500 ml-1 uppercase">Description (Optional)</label>
                                        <textarea value={uploadDesc} onChange={e => setUploadDesc(e.target.value)} placeholder="게시물에 대한 설명을 입력하세요" rows="4" className="w-full p-4 bg-slate-50 rounded-2xl font-black border-2 border-transparent focus:border-blue-300 outline-none transition-all resize-none custom-scrollbar text-sm" />
                                    </div>

                                    <button onClick={handleUpload} disabled={isUploading || !uploadFile || !uploadTitle} className={`w-full py-5 rounded-[24px] font-black text-lg text-white transition-all shadow-xl uppercase mt-4 flex justify-center items-center gap-2 ${isUploading ? 'bg-blue-400 cursor-not-allowed' : (!uploadFile || !uploadTitle) ? 'bg-slate-300 cursor-not-allowed shadow-none' : 'bg-blue-600 hover:bg-blue-700 active:scale-95 shadow-blue-200'}`}>
                                        {isUploading ? (
                                            <>
                                                <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                                업로드 중... ({Math.round(uploadProgress)}%)
                                            </>
                                        ) : 'Upload'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ===================== 게시글 상세 뷰 ===================== */}
                        {view === 'detail' && currentPost && (
                            <div className="max-w-2xl mx-auto w-full flex flex-col h-full bg-white rounded-[40px] shadow-2xl border border-slate-100 overflow-hidden animate-slide-up relative">
                                {/* 상단 헤더 */}
                                <div className="p-4 sm:p-5 flex items-center justify-between border-b border-slate-100 bg-white z-10 sticky top-0">
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => setView('gallery')} className="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition-all"><Icon.ArrowLeft size={20}/></button>
                                        <div>
                                            <p className="text-sm font-black text-slate-900">{currentPost.uploaderName}</p>
                                            <p className="text-[10px] font-bold text-slate-400">{formatDate(currentPost.createdAt)}</p>
                                        </div>
                                    </div>
                                    {(isManager || loggedInUser.id === currentPost.uploaderId) && (
                                        <button onClick={() => handleDeletePost(currentPost)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-full transition-all"><Icon.Trash size={18}/></button>
                                    )}
                                </div>

                                {/* 미디어 영역 */}
                                <div className="w-full bg-slate-900 relative flex items-center justify-center min-h-[300px] max-h-[60vh]">
                                    {currentPost.type === 'image' ? (
                                        <img src={currentPost.mediaUrl} alt={currentPost.title} className="w-full h-full object-contain max-h-[60vh]" />
                                    ) : (
                                        <video src={currentPost.mediaUrl} controls className="w-full h-full object-contain max-h-[60vh]" playsInline />
                                    )}
                                </div>

                                {/* 하단 정보 및 댓글 영역 (스크롤) */}
                                <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col bg-white">
                                    <div className="p-5 sm:p-6 border-b border-slate-100">
                                        {/* 액션 바 */}
                                        <div className="flex items-center gap-4 mb-4">
                                            <button onClick={(e) => toggleLike(currentPost, e)} className="flex items-center gap-1.5 group">
                                                {currentPost.likes && currentPost.likes.includes(loggedInUser?.id) ? (
                                                    <Icon.HeartFill size={28} className="text-rose-500 active:scale-75 transition-transform" />
                                                ) : (
                                                    <Icon.Heart size={28} className="text-slate-400 group-hover:text-rose-400 active:scale-75 transition-transform" />
                                                )}
                                                <span className="font-black text-slate-700 text-lg">{currentPost.likes ? currentPost.likes.length : 0}</span>
                                            </button>
                                            <div className="flex items-center gap-1.5 text-slate-400">
                                                <Icon.MessageCircle size={26} />
                                                <span className="font-black text-lg">{comments.length}</span>
                                            </div>
                                        </div>

                                        <h3 className="text-xl sm:text-2xl font-black text-slate-900 mb-2 leading-tight">{currentPost.title}</h3>
                                        {currentPost.description && <p className="text-slate-600 font-bold text-sm whitespace-pre-wrap">{currentPost.description}</p>}
                                    </div>

                                    {/* 댓글 리스트 */}
                                    <div className="p-5 sm:p-6 space-y-4 flex-1">
                                        {comments.length === 0 ? (
                                            <p className="text-center text-slate-400 font-bold text-sm py-4">첫 댓글을 남겨보세요!</p>
                                        ) : (
                                            comments.map(c => (
                                                <div key={c.id} className="flex gap-3 group">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex-shrink-0 flex items-center justify-center text-slate-400"><Icon.User size={16}/></div>
                                                    <div className="flex-1 bg-slate-50 p-3 sm:p-4 rounded-2xl rounded-tl-sm border border-slate-100 relative">
                                                        <div className="flex justify-between items-start mb-1">
                                                            <span className="font-black text-xs text-slate-800">{c.authorName}</span>
                                                            <span className="text-[9px] font-bold text-slate-400">{formatDate(c.createdAt)}</span>
                                                        </div>
                                                        <p className="text-slate-700 text-sm font-bold whitespace-pre-wrap">{c.text}</p>
                                                        
                                                        {(isManager || loggedInUser?.id === c.authorId) && (
                                                            <button onClick={() => handleDeleteComment(c.id, c.authorId)} className="absolute top-2 right-2 p-1 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity bg-white rounded shadow-sm border border-slate-100"><Icon.Trash size={12}/></button>
                                                        )}
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                        <div ref={commentsEndRef} />
                                    </div>
                                </div>

                                {/* 댓글 입력 바 */}
                                <div className="p-4 border-t border-slate-100 bg-slate-50 sticky bottom-0 z-10 pb-safe">
                                    <form onSubmit={handleAddComment} className="flex items-center gap-2 max-w-2xl mx-auto relative">
                                        <input 
                                            type="text" 
                                            value={newComment} 
                                            onChange={e => setNewComment(e.target.value)} 
                                            placeholder="댓글 달기..." 
                                            className="flex-1 bg-white border border-slate-200 rounded-full px-5 py-3.5 sm:py-4 font-bold text-sm outline-none focus:border-blue-400 transition-colors pr-14 shadow-inner"
                                        />
                                        <button type="submit" disabled={!newComment.trim()} className={`absolute right-1.5 w-10 h-10 sm:w-11 sm:h-11 rounded-full flex items-center justify-center transition-all ${newComment.trim() ? 'bg-blue-600 text-white shadow-md active:scale-90' : 'bg-slate-100 text-slate-300'}`}>
                                            <Icon.Send size={16} className="-ml-0.5 mt-0.5" />
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 로그인 모달 */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[9000] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[48px] w-full max-w-md p-10 shadow-2xl animate-zoom-in text-center border-2 border-blue-50 relative flex flex-col max-h-[90vh]">
                                
                                <button onClick={() => window.location.href = 'https://nakdo0415-crypto.github.io/OTP-FC/home.html'} className="absolute top-8 left-8 text-slate-300 hover:text-slate-500 transition-all bg-transparent border-none">
                                    <Icon.Home size={24} />
                                </button>

                                <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-100 text-white flex-shrink-0">
                                    <Icon.Image size={36} />
                                </div>
                                <h2 className="text-3xl font-black text-slate-900 mb-2 tracking-tighter uppercase">Gallery Login</h2>
                                <p className="text-slate-400 text-sm font-bold mb-6 tracking-widest text-xs flex-shrink-0">이름과 비밀번호를 입력해주세요</p>
                                
                                <div className="space-y-4 mb-8 text-left w-full">
                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-black text-slate-500 ml-1 uppercase">Name</label>
                                        <input
                                            type="text"
                                            value={loginForm.name}
                                            onChange={e => setLoginForm({...loginForm, name: e.target.value})}
                                            placeholder="이름 입력"
                                            className="w-full p-4 bg-slate-50 rounded-2xl font-black border-2 border-transparent focus:border-blue-300 outline-none transition-all"
                                        />
                                    </div>
                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-black text-slate-500 ml-1 uppercase">Password</label>
                                        <input
                                            type="password"
                                            value={loginForm.password}
                                            onChange={e => setLoginForm({...loginForm, password: e.target.value})}
                                            placeholder="생년월일 6자리 (예: 900101)"
                                            className="w-full p-4 bg-slate-50 rounded-2xl font-black border-2 border-transparent focus:border-blue-300 outline-none transition-all tracking-widest"
                                            onKeyPress={e => e.key === 'Enter' && handleLogin()}
                                        />
                                    </div>
                                </div>
                                <button 
                                    onClick={handleLogin} 
                                    disabled={!loginForm.name || !loginForm.password}
                                    className={`w-full py-5 rounded-3xl font-black text-lg shadow-xl transition-all uppercase text-center flex-shrink-0 ${
                                        loginForm.name && loginForm.password
                                        ? 'bg-blue-600 text-white shadow-blue-100 hover:bg-blue-700 active:scale-95' 
                                        : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                    }`}
                                >
                                    입장하기
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Alert Modal */}
                    {alertModal.show && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[9999] flex items-center justify-center p-4" onClick={() => setAlertModal(p => ({...p, show: false}))}>
                            <div className="bg-white rounded-[40px] w-full max-w-sm p-8 shadow-2xl text-center animate-zoom-in" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-black mb-3 text-slate-900">{alertModal.title}</h3>
                                <p className="text-slate-500 font-bold mb-8 whitespace-pre-wrap text-sm leading-relaxed">{alertModal.content}</p>
                                <div className="flex gap-2">
                                    {alertModal.type === 'confirm' && <button onClick={() => setAlertModal(p => ({...p, show: false}))} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black active:scale-95 transition-all text-sm">취소</button>}
                                    <button onClick={() => { if (alertModal.onConfirm) alertModal.onConfirm(); setAlertModal(p => ({...p, show: false})); }} className={`flex-1 py-4 text-white rounded-2xl font-black active:scale-95 transition-all text-sm ${alertModal.type === 'confirm' ? 'bg-blue-600' : 'bg-slate-900 w-full'}`}>확인</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
