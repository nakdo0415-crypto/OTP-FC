                                            <div key={idx} ref={el => teamRefs.current[idx] = el} className="team-card bg-white rounded-2xl md:rounded-[32px] shadow-lg md:shadow-xl overflow-hidden border border-slate-100 text-left h-full flex flex-col" data-team-idx={idx} onDragOver={(e) => {e.preventDefault(); handleDragOver(e, idx, null);}} onDrop={(e) => {e.preventDefault(); handleDrop(e, idx, null);}} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                                                <div className={`p-2 md:p-3 text-center font-black flex flex-col justify-between px-2 md:px-5 ${getTeamBadgeColor(idx)}`}>
                                                    <div className="flex justify-between items-center w-full mb-1">
                                                        <span className="text-[7px] md:text-[9px] opacity-90 tracking-widest uppercase inline-block">
                                                            {idx < 3 ? 'IAMGROUND' : 'PLAB'}
                                                        </span>
                                                        <span className="text-[7px] md:text-[9px] font-black whitespace-nowrap opacity-90">
                                                            {team.scoreSum} pts
                                                        </span>
                                                    </div>
                                                    <div className="flex justify-between items-center w-full">
                                                        <span className="text-[10px] md:text-base uppercase tracking-tight whitespace-nowrap">Team {idx + 1}</span>
                                                        <span className="text-[8px] md:text-[10px] font-bold opacity-80 uppercase whitespace-nowrap">{team.members.length} 명</span>
                                                    </div>
                                                </div>
                                                <div className="p-1 md:p-2 space-y-1 text-left min-h-[100px] flex-grow">
                                                    {team.members.map((m, mIdx) => {
                                                        const isPartnerPresent = m.coupleId && selectedList.some(p => p.memberId === m.coupleId);
                                                        const isDragging = draggedItem?.teamIdx === idx && draggedItem?.memberIdx === mIdx;
                                                        const isDragTarget = dragOverItem?.teamIdx === idx && dragOverItem?.memberIdx === mIdx;
                                                        return (
                                                            <div key={mIdx} data-team-idx={idx} data-member-idx={mIdx} draggable onDragStart={(e) => handleDragStart(e, idx, mIdx)} onDragOver={(e) => {e.preventDefault(); e.stopPropagation(); handleDragOver(e, idx, mIdx);}} onDragEnd={handleDragEnd} onDrop={(e) => {e.stopPropagation(); handleDrop(e, idx, mIdx);}} onTouchStart={(e) => handleTouchStart(e, idx, mIdx, m)} onContextMenu={handleContextMenu} className={`relative transition-all duration-200 touch-action-none ${isDragging ? 'dragging' : ''} ${isDragTarget ? 'pt-12' : ''}`}>
                                                                {isDragTarget && <div className="absolute top-0 left-0 right-0 h-10 border-2 border-dashed border-blue-400 bg-blue-50/50 rounded-xl flex items-center justify-center pointer-events-none transform -translate-y-1"><span className="text-blue-500 font-bold text-xs">이 위치로 이동</span></div>}
                                                                <div className={`flex items-center justify-between p-1 sm:p-1.5 gap-0.5 bg-slate-50 rounded md:rounded-xl transition-all shadow-sm border border-slate-100/50 md:border-transparent cursor-move select-none ${!isDragging ? 'hover:bg-blue-50 hover:border-blue-300 hover:shadow-md hover:scale-[1.02] hover:z-10 relative' : ''}`}>
                                                                    <div className="flex items-center gap-0.5 flex-1 min-w-0">
                                                                        <span className="w-3.5 h-3.5 md:w-5 md:h-5 flex items-center justify-center rounded-full text-[7px] md:text-[9px] font-black flex-shrink-0 bg-slate-200 text-slate-500">{mIdx + 1}</span>
                                                                        <div className="flex items-center gap-0.5 text-slate-900 leading-none flex-nowrap whitespace-nowrap overflow-hidden">
                                                                            <span className="font-black text-slate-800 text-[8px] sm:text-[9px] md:text-xs tracking-tighter whitespace-nowrap">{m.name}</span>
                                                                            {m.gender === '여성' && <span className="text-[7px] md:text-[10px] font-black px-1.5 py-0.5 bg-pink-100 text-pink-600 rounded-lg flex-shrink-0 leading-none">W</span>}
                                                                            {isPartnerPresent && <span className="text-pink-400 text-[7px] md:text-[10px] flex-shrink-0 flex items-center"><Icon.Heart size={10} /></span>}
                                                                            {m.isGuest && <span className="text-[9px] md:text-[12px] font-black text-slate-800 flex-shrink-0 leading-none">G</span>}
                                                                        </div>
                                                                    </div>
                                                                    <span className={`text-[7px] md:text-[10px] font-black px-1.5 py-0.5 rounded-lg level-tag flex-shrink-0 leading-none ml-0.5 ${getLevelColor(m.level)}`}>{m.level}</span>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                    {dragOverItem?.teamIdx === idx && dragOverItem?.memberIdx === null && <div className="h-10 border-2 border-dashed border-blue-400 bg-blue-50/50 rounded-xl mt-2 flex items-center justify-center pointer-events-none animate-pulse"><span className="text-blue-500 font-bold text-xs">맨 뒤로 이동</span></div>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-10 p-6 bg-white rounded-[40px] border border-slate-200 shadow-lg space-y-6 max-w-4xl mx-auto text-left text-slate-900">
                                        <div className="flex flex-col sm:flex-row gap-3 justify-center text-left">
                                            <button onClick={resetTeams} className="flex-1 flex items-center justify-center gap-2 px-6 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-sm hover:bg-slate-200 transition-all text-left outline-none"><Icon.RotateCcw /> 초기화</button>
                                            <button onClick={generateTeams} className="flex-1 flex items-center justify-center gap-2 px-6 py-4 bg-slate-900 text-white rounded-2xl font-black text-sm hover:bg-slate-800 transition-all text-left outline-none"><Icon.Refresh /> 다시 편성</button>
                                            <button onClick={() => setIsSaveModalOpen(true)} className="flex-1 flex items-center justify-center gap-2 px-6 py-4 bg-blue-600 text-white rounded-2xl font-black text-sm shadow-xl hover:bg-blue-700 transition-all text-left outline-none"><Icon.Bookmark /> 임시저장</button>
                                            <button onClick={confirmTeams} className={`flex-1 flex items-center justify-center gap-2 px-6 py-4 rounded-2xl font-black text-sm shadow-xl transition-all text-left outline-none ${isConfirmed ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-slate-200 hover:bg-slate-300 text-slate-600'}`}><Icon.Check /> {isConfirmed ? '확정됨' : '편성 확정'}</button>
                                        </div>
                                        <div className="border-t border-slate-100 pt-6 text-left">
                                            <p className="text-center text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">Export Options</p>
                                            <div className="flex flex-col sm:flex-row gap-3 justify-center text-left">
                                                <button onClick={captureIndividualTeams} disabled={isCapturing} className="flex-1 max-w-xs flex items-center justify-center gap-2 px-8 py-4 bg-slate-100 text-slate-700 rounded-2xl font-black text-xs hover:bg-slate-200 transition-all disabled:opacity-50 text-left text-slate-700 outline-none"><Icon.Camera /> 팀별 개별 저장</button>
                                                <button onClick={captureAllInOne} disabled={isCapturing} className="flex-1 max-w-xs flex items-center justify-center gap-2 px-8 py-4 bg-blue-50 text-blue-600 rounded-2xl font-black text-xs hover:bg-blue-100 transition-all disabled:opacity-50 text-left text-blue-600 outline-none"><Icon.Download /> 한 장으로 저장 (3팀씩)</button>
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    )}

                    {activeTab === 'drafts' && (
                        <div className="animate-fade-in space-y-4 text-left max-w-3xl mx-auto text-slate-900">
                             <div className="flex gap-2 mb-6">
                                <button onClick={() => setStorageTab('drafts')} className={`flex-1 py-3 rounded-xl font-black text-xs sm:text-sm transition-all outline-none ${storageTab === 'drafts' ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400 hover:text-slate-600'}`}>임시 저장 ({savedDrafts.length})</button>
                                <button onClick={() => setStorageTab('history')} className={`flex-1 py-3 rounded-xl font-black text-xs sm:text-sm transition-all outline-none ${storageTab === 'history' ? 'bg-green-600 text-white shadow-lg' : 'bg-white text-slate-400 hover:text-slate-600'}`}>확정 기록 ({confirmedHistory.length})</button>
                            </div>
                            
                            {(storageTab === 'drafts' ? savedDrafts : confirmedHistory).length === 0 ? (
                                <div className="py-20 text-center text-slate-300 font-black">기록이 없습니다.</div>
                            ) : (
                                <div className="grid gap-4">
                                    {(storageTab === 'drafts' ? savedDrafts : confirmedHistory).map(item => (
                                        <div 
                                            key={item.id} 
                                            className={`bg-white p-6 rounded-[32px] border shadow-sm flex flex-col sm:flex-row sm:items-center justify-between transition-all gap-4 relative group cursor-pointer ${storageTab === 'history' ? 'border-green-100 hover:border-green-300' : 'border-slate-200 hover:border-blue-300'}`}
                                            onClick={() => setPreviewModalData(item)}
                                        >
                                            <div className="text-left text-slate-900 pointer-events-none">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="text-lg font-black text-slate-800">{item.meetingDate}</span>
                                                    {item.timeLabel && <span className="text-[10px] text-slate-400 font-bold bg-slate-50 px-2 py-0.5 rounded-full">{item.timeLabel}</span>}
                                                    {storageTab === 'history' && <span className="text-[10px] text-green-600 font-black bg-green-50 px-2 py-0.5 rounded-full border border-green-100">CONFIRMED</span>}
                                                </div>
                                                <div className="flex flex-col gap-1 text-slate-500 text-left leading-none">
                                                    <div className="flex gap-2 items-center leading-none text-left">
                                                        <span className="text-[10px] font-bold text-green-600 uppercase tracking-widest text-left flex items-center gap-1"><Icon.Clock size={10}/> {item.meetingTimeRange}</span>
                                                        <div className="w-px h-2 bg-slate-200 text-left" />
                                                        <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest text-left">{item.teams?.length || 0}개 팀</span>
                                                        {item.managerName && (
                                                            <>
                                                                <div className="w-px h-2 bg-slate-200 text-left" />
                                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-left flex items-center gap-1"><Icon.Shield size={10}/> {item.managerName}</span>
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex gap-2 text-left w-full sm:w-auto" onClick={(e) => e.stopPropagation()}>
                                                <button onClick={() => loadDraft(item)} className={`flex-1 sm:flex-none px-6 py-3 rounded-2xl font-black text-xs transition-all text-center outline-none ${storageTab === 'history' ? 'bg-green-50 text-green-600 hover:bg-green-100' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`}>불러오기</button>
                                                <button onClick={() => openDeleteModal(item.id)} className="p-3 text-slate-300 hover:text-red-500 transition-all bg-slate-50 rounded-2xl hover:bg-red-50 outline-none border-none"><Icon.Trash size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Mobile Preview Modal */}
                    {previewModalData && (
                        <div className={`fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[8000] flex justify-center p-4 ${isCapturing ? 'items-start overflow-y-auto py-10' : 'items-center'}`} onClick={() => { if(!isCapturing) { setPreviewModalData(null); setCapturedImage(null); } }}>
                            <div 
                                className={`bg-white w-full max-w-sm shadow-2xl flex flex-col ${isCapturing || capturedImage ? 'rounded-[40px] h-auto' : 'rounded-[40px] overflow-hidden max-h-[80vh] animate-zoom-in'}`} 
                                onClick={e => e.stopPropagation()}
                            >
                                {capturedImage ? (
                                    <div className="flex flex-col items-center">
                                        <div className="bg-slate-100 p-4 rounded-t-[40px] w-full text-center border-b border-slate-200">
                                            <p className="text-sm font-black text-slate-800">📸 이미지 생성 완료!</p>
                                            <p className="text-[10px] text-slate-500 mt-1">모바일은 아래 이미지를 <b>길게 눌러 저장</b>하세요.</p>
                                        </div>
                                        <div className="p-4 w-full overflow-y-auto max-h-[60vh] custom-scrollbar bg-slate-50 flex justify-center">
                                            <img src={capturedImage} alt="Captured List" className="w-full rounded-2xl shadow-sm border border-slate-200" />
                                        </div>
                                        <div className="p-4 bg-white w-full border-t border-slate-100 flex gap-2 rounded-b-[40px]">
                                            <button onClick={() => setCapturedImage(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-black shadow-sm active:scale-95 transition-all text-xs outline-none">다시 보기</button>
                                            <button onClick={handleDownloadImage} className="flex-[2] py-3 bg-blue-600 text-white rounded-2xl font-black shadow-md active:scale-95 transition-all text-xs flex items-center justify-center gap-1.5 outline-none"><Icon.Save size={14}/> PC 다운로드</button>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        <div className="p-6 bg-slate-900 text-white text-center">
                                            <h3 className="text-xl font-black mb-1">{previewModalData.meetingDate}</h3>
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">{previewModalData.meetingTimeRange} ({previewModalData.teams?.length || 0} Teams)</p>
                                        </div>
                                        
                                        <div className={`p-6 bg-white flex-1 ${isCapturing ? '' : 'overflow-y-auto custom-scrollbar'}`}>
                                            <div className="space-y-4">
                                                {previewModalData.teams?.map((t, idx) => (
                                                    <div key={idx} className={`border rounded-2xl p-3 ${getTeamColorClass(idx)}`}>
                                                        <div className="flex justify-between items-center mb-2">
                                                            <span className={`text-xs font-black px-2 py-0.5 rounded-lg ${getTeamBadgeColor(idx)}`}>Team {idx+1}</span>
                                                            <span className="text-[10px] font-bold opacity-70">{t.scoreSum}pts</span>
                                                        </div>
                                                        <div className="flex flex-wrap gap-1">
                                                            {t.members?.map(m => (
                                                                <span key={m.name} className="text-[10px] bg-white/60 px-1.5 py-0.5 rounded font-bold">{m.name}</span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {!isCapturing && (
                                            <div className="p-4 bg-slate-50 border-t border-slate-100 flex flex-col gap-2 rounded-b-[40px]">
                                                <button 
                                                    onClick={capturePreviewImage} 
                                                    className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-md active:scale-95 transition-all text-sm flex items-center justify-center gap-2 outline-none border-none"
                                                >
                                                    <Icon.Save size={16}/> 이 화면을 이미지로 저장
                                                </button>
                                                <div className="flex gap-2">
                                                    <button 
                                                        onClick={() => { setPreviewModalData(null); setCapturedImage(null); }} 
                                                        className="flex-1 py-3 bg-white border border-slate-200 text-slate-500 rounded-2xl font-black shadow-sm active:scale-95 transition-all text-xs outline-none"
                                                    >
                                                        닫기
                                                    </button>
                                                    <button 
                                                        onClick={copyPreviewToText} 
                                                        className="flex-1 py-3 bg-slate-800 text-white rounded-2xl font-black shadow-md active:scale-95 transition-all text-xs flex items-center justify-center gap-1.5 outline-none border-none"
                                                    >
                                                        <Icon.FileSpreadsheet size={14}/> 텍스트 복사
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Hidden Capture Container for Preview Modal (High Res) */}
                    {previewModalData && (
                        <div style={{ position: 'fixed', top: '-9999px', left: '-9999px', width: '1200px', pointerEvents: 'none' }}>
                            <div id="preview-render-target" className="p-10 bg-slate-50 grid grid-cols-3 gap-5">
                                <div className="col-span-3 text-center mb-8">
                                    <h1 className="text-4xl font-black text-slate-900 mb-2">OTP FC TEAM LIST</h1>
                                    <div className="text-lg font-bold text-slate-500">DATE: {previewModalData.meetingDate} ({previewModalData.meetingTimeRange}) | MGR: {previewModalData.managerName || '미정'}</div>
                                </div>
                                {previewModalData.teams?.map((team, idx) => (
                                    <div key={idx} className="bg-white rounded-3xl border border-slate-200 overflow-hidden flex flex-col shadow-sm">
                                        <div className={`p-4 text-center font-black flex justify-between items-center ${getTeamBadgeColor(idx)}`}>
                                            <span className="text-xl uppercase tracking-tight">Team {idx + 1}</span>
                                            <span className="text-sm opacity-90">{team.scoreSum} pts</span>
                                        </div>
                                        <div className="p-4 space-y-2 flex-grow">
                                            {team.members?.map((m, mIdx) => (
                                                <div key={mIdx} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                    <div className="flex items-center gap-2">
                                                        <span className="w-6 h-6 flex items-center justify-center rounded-full text-xs font-black bg-slate-200 text-slate-500">{mIdx + 1}</span>
                                                        <span className="font-black text-slate-800 text-base">{m.name}</span>
                                                        {m.gender === '여성' && <span className="text-xs font-black px-1.5 py-0.5 bg-pink-100 text-pink-600 rounded-lg">W</span>}
                                                        {m.isGuest && <span className="text-sm font-black text-slate-800">G</span>}
                                                    </div>
                                                    <span className={`text-xs font-black px-1.5 py-0.5 rounded-lg ${getLevelColor(m.level)}`}>{m.level}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'settings' && (
                        <div className="animate-fade-in text-left max-w-xl mx-auto text-slate-900">
                            <div className="bg-white p-8 rounded-[40px] border border-slate-200 shadow-lg text-slate-900 text-left">
                                <h3 className="text-xl font-black mb-6 text-slate-800 flex items-center gap-2">
                                    <Icon.Settings /> 폰트 설정
                                </h3>
                                
                                <div className="mb-8">
                                    <p className="text-sm font-bold text-slate-500 mb-2">현재 적용된 폰트</p>
                                    <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                                        <p className="font-black text-lg text-blue-600">{customFontName}</p>
                                    </div>
                                </div>

                                <div 
                                    className={`relative p-8 rounded-3xl border-2 border-dashed transition-all cursor-pointer ${isDraggingFile ? 'dropzone-active' : 'border-slate-300 bg-slate-50 hover:bg-slate-100'}`}
                                    onDragOver={(e) => { e.preventDefault(); setIsDraggingFile(true); }}
                                    onDragLeave={(e) => { e.preventDefault(); setIsDraggingFile(false); }}
                                    onDrop={handleFontFileDrop}
                                >
                                    <div className="flex flex-col items-center justify-center text-center gap-3 py-4 pointer-events-none">
                                        <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-2">
                                            <Icon.Upload />
                                        </div>
                                        <p className="font-black text-slate-700">폰트 파일(.ttf)을 여기로 드래그하세요</p>
                                        <p className="text-xs font-medium text-slate-400 max-w-[200px] leading-relaxed">
                                            ttf, otf, woff 파일을 지원하며<br/>드롭 즉시 전체 폰트가 변경됩니다.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {isSaveModalOpen && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 modal-backdrop">
                            <div className="bg-white w-full max-w-sm rounded-[32px] shadow-2xl overflow-hidden animate-fade-in p-8 text-center">
                                <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon.AlertCircle />
                                </div>
                                <h3 className="text-xl font-black text-slate-900 mb-2">편성안 저장</h3>
                                <p className="text-sm font-bold text-slate-500 mb-8 leading-relaxed">
                                    현재 구성된 팀 편성 결과(3개 팀)를<br/>저장소에 임시로 기록하시겠습니까?
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => setIsSaveModalOpen(false)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm hover:bg-slate-200 transition-all text-slate-600 outline-none">취소</button>
                                    <button onClick={confirmSaveDraft} disabled={isProcessing} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black text-sm shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all disabled:opacity-50 outline-none border-none">
                                        {isProcessing ? "저장 중..." : "저장하기"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isDeleteModalOpen && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 modal-backdrop text-slate-900">
                            <div className="bg-white w-full max-w-sm rounded-[32px] shadow-2xl overflow-hidden animate-fade-in p-8 text-center">
                                <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon.Trash />
                                </div>
                                <h3 className="text-xl font-black text-slate-900 mb-2">기록 삭제</h3>
                                <p className="text-sm font-bold text-slate-500 mb-8 leading-relaxed">
                                    해당 편성 기록을 영구적으로 삭제하시겠습니까?<br/>삭제된 데이터는 복구할 수 없습니다.
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => {setIsDeleteModalOpen(false); setTargetDeleteId(null);}} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm hover:bg-slate-200 transition-all outline-none">취소</button>
                                    <button onClick={confirmDeleteDraft} disabled={isProcessing} className="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black text-sm shadow-lg shadow-rose-100 hover:bg-rose-700 transition-all disabled:opacity-50 outline-none border-none">
                                        {isProcessing ? "삭제 중..." : "삭제하기"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
