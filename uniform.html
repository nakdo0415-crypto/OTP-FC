<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OTP FC 유니폼 주문 시스템</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Esamanru', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @font-face {
            font-family: 'Esamanru';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicMedium.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Esamanru';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicBold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }
        body { font-family: 'Esamanru', sans-serif !important; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-zoom-in { animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase 설정 및 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyCAcQzliuWJTB8vPm9gb0vsyR8pIAx7YTw",
            authDomain: "otp-fc-check.firebaseapp.com",
            projectId: "otp-fc-check",
            storageBucket: "otp-fc-check.firebasestorage.app",
            messagingSenderId: "907414776392",
            appId: "1:907414776392:web:0a29a660bb956e5a40467d"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const APP_ID = 'otp-fc-attendance';

        // 아이콘 (lucide-react 대체)
        const Icon = {
            Download: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Users: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Shirt: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>,
            CheckCircle2: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/></svg>,
            Circle: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/></svg>,
            ClipboardList: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>,
            Home: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            RefreshCw: ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
        };

        const SIZES = ['85(XS)', '90(S)', '95(M)', '100(L)', '105(XL)', '110(2XL)', '115(3XL)'];

        const getGenderPastelClass = (gender) => gender === '남성' ? 'bg-[#E1F0FF] text-[#2563EB]' : 'bg-[#FFE5ED] text-[#DB2777]';
        const getPosColorClass = (pos) => {
            if (!pos) return 'bg-slate-50 text-slate-400 border-slate-100';
            const p = String(pos).toLowerCase();
            if (p.includes('피보')) return 'bg-red-50 text-red-500 border-red-100';
            if (p.includes('아라')) return 'bg-green-50 text-green-600 border-green-100';
            if (p.includes('픽소')) return 'bg-blue-50 text-blue-500 border-blue-100';
            if (p.includes('골레이로')) return 'bg-purple-50 text-purple-600 border-purple-100';
            return 'bg-yellow-50 text-yellow-600 border-yellow-100';
        };
        const getRoleBadgeClass = (role) => {
            switch(role) {
                case '회장': return 'bg-slate-900 text-white';
                case '매니저': return 'bg-blue-600 text-white';
                case '총무': return 'bg-green-600 text-white';
                case '부총무': return 'bg-green-100 text-green-700';
                default: return 'bg-slate-100 text-slate-400';
            }
        };

        function App() {
            const [members, setMembers] = useState([]);
            const [orders, setOrders] = useState({}); 
            const [activeTab, setActiveTab] = useState('selection');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const initData = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (e) {
                        console.error("Auth error:", e);
                    }
                };
                initData();

                const unsubAuth = auth.onAuthStateChanged(user => {
                    if (user) {
                        // 1. 회원 명단 구독
                        const membersRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('members');
                        const unsubMembers = membersRef.onSnapshot(snap => {
                            const fetchedMembers = snap.docs
                                .map(d => ({ id: d.id, ...d.data() }))
                                .filter(m => !m.isResigned)
                                .sort((a, b) => a.name.localeCompare(b.name));
                            setMembers(fetchedMembers);
                            setLoading(false);
                        });

                        // 2. 주문 데이터 구독
                        const ordersRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('uniform_settings').doc('current_order');
                        const unsubOrders = ordersRef.onSnapshot(docSnap => {
                            if (docSnap.exists && docSnap.data().data) {
                                setOrders(docSnap.data().data);
                            }
                        });

                        return () => { unsubMembers(); unsubOrders(); };
                    }
                });

                return () => unsubAuth();
            }, []);

            const saveOrdersToFirebase = async (newOrders) => {
                try {
                    const ordersRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('uniform_settings').doc('current_order');
                    // merge 옵션 없이 완벽히 덮어씌움 (체크 해제 정상 작동)
                    await ordersRef.set({ 
                        data: newOrders,
                        updatedAt: new Date().toISOString()
                    }); 
                } catch (e) {
                    console.error("Order save failed:", e);
                }
            };

            const toggleOrder = (member) => {
                const newOrders = { ...orders };
                if (newOrders[member.id]) {
                    delete newOrders[member.id];
                } else {
                    newOrders[member.id] = { 
                        topSize: '100(L)', 
                        bottomSize: '100(L)', 
                        sleeveType: '반팔',
                        number: '', 
                        printName: member.name, 
                        includeShorts: false 
                    };
                }
                setOrders(newOrders);
                saveOrdersToFirebase(newOrders);
            };

            const updateOrderDetail = (memberId, field, value) => {
                const newOrders = { 
                    ...orders, 
                    [memberId]: { ...orders[memberId], [field]: value } 
                };
                setOrders(newOrders);
                saveOrdersToFirebase(newOrders);
            };

            const exportToCSV = () => {
                const orderKeys = Object.keys(orders);
                if (orderKeys.length === 0) {
                    alert("구매 희망자가 없습니다.");
                    return;
                }

                const headers = ['이름', '성별', '소매 기장', '상의 사이즈', '등번호', '마킹 이름', '반바지 추가', '하의 사이즈'];
                const rows = orderKeys.map(id => {
                    const m = members.find(x => x.id === id);
                    if(!m) return null;
                    const d = orders[id];
                    const topSize = d.topSize || d.size || '100(L)';
                    const bottomSize = d.includeShorts ? (d.bottomSize || '100(L)') : 'X';
                    const sleeveType = d.sleeveType || '반팔';
                    return `${m.name},${m.gender},${sleeveType},${topSize},${d.number},${d.printName},${d.includeShorts ? 'O' : 'X'},${bottomSize}`;
                }).filter(Boolean);

                const csvContent = [headers.join(','), ...rows].join('\n');
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', `OTP_FC_유니폼_주문명단_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const orderedCount = Object.keys(orders).length;
            const orderingMembers = members.filter(m => orders[m.id]);

            if (loading) {
                return (
                    <div className="fixed inset-0 bg-[#f8fafc] flex flex-col items-center justify-center z-50">
                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <p className="mt-4 font-bold text-slate-500 animate-pulse">명단 연동 중...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f8fafc] text-slate-900 pb-24">
                    <nav className="sticky top-0 bg-white/90 backdrop-blur-md border-b border-slate-100 z-50 h-16 sm:h-20 flex items-center px-4 shadow-sm transition-all">
                        <div className="max-w-6xl mx-auto w-full flex justify-between items-center">
                            <div className="flex items-center gap-1 sm:gap-2">
                                <button onClick={() => window.location.href = 'https://nakdo0415-crypto.github.io/OTP-FC/home.html'} className="p-2.5 mr-1 sm:mr-2 rounded-xl transition-all bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center">
                                    <Icon.Home size={18} />
                                </button>
                                <div className="flex items-center gap-3">
                                    <h1 className="text-2xl font-black text-[#db2777] tracking-tighter uppercase leading-none drop-shadow-sm">OTP FC</h1>
                                    <span className="text-slate-400 font-bold text-xs uppercase hidden sm:flex items-center gap-1"><Icon.Shirt size={14}/> 유니폼 주문 시스템</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-3 text-xs sm:text-sm font-black">
                                <span className="text-slate-400">총원 <span className="text-slate-600">{members.length}</span></span>
                                <span className="text-slate-200">|</span>
                                <span className="text-slate-400">주문 <span className="text-blue-600">{orderedCount}</span></span>
                                <button onClick={() => window.location.reload()} className="p-2 ml-2 rounded-xl bg-slate-50 text-slate-400 hover:text-blue-600 transition-all">
                                    <Icon.RefreshCw size={18} />
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 sm:p-8 animate-zoom-in">
                        <div className="flex bg-slate-100 p-1.5 rounded-2xl w-fit mb-8 shadow-inner mx-auto sm:mx-0">
                            <button
                                onClick={() => setActiveTab('selection')}
                                className={`flex items-center gap-2 px-6 py-3 text-sm font-black rounded-xl transition-all ${
                                    activeTab === 'selection' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'
                                }`}
                            >
                                <Icon.Users size={16} /> 1. 구매자 선택
                            </button>
                            <button
                                onClick={() => setActiveTab('details')}
                                className={`flex items-center gap-2 px-6 py-3 text-sm font-black rounded-xl transition-all ${
                                    activeTab === 'details' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'
                                }`}
                            >
                                <Icon.ClipboardList size={16} /> 2. 상세 정보 입력
                                {orderedCount > 0 && (
                                    <span className="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full ml-1 font-black">
                                        {orderedCount}
                                    </span>
                                )}
                            </button>
                        </div>

                        {activeTab === 'selection' && (
                            <div className="animate-zoom-in">
                                <div className="mb-6">
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tighter">구매 희망자 선택</h2>
                                    <p className="text-xs font-bold text-slate-400 mt-1">유니폼을 구매할 회원의 카드를 탭하여 선택해주세요.</p>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {members.map(m => {
                                        const isSelected = !!orders[m.id];
                                        return (
                                            <div 
                                                key={m.id}
                                                onClick={() => toggleOrder(m)}
                                                className={`p-5 sm:p-6 rounded-[32px] border-2 cursor-pointer relative group transition-all duration-200 ${
                                                    isSelected 
                                                        ? 'border-blue-500 bg-blue-50/50 shadow-md ring-4 ring-blue-500/10' 
                                                        : 'border-slate-100 bg-white hover:shadow-lg hover:border-slate-200'
                                                }`}
                                            >
                                                <div className="flex items-start gap-4 text-left">
                                                    <div className={`flex-shrink-0 w-14 h-14 rounded-full flex items-center justify-center text-xl font-black shadow-lg transition-transform ${isSelected ? 'bg-blue-600 text-white scale-110' : getGenderPastelClass(m.gender)}`}>
                                                        {isSelected ? <Icon.CheckCircle2 size={28} /> : m.level}
                                                    </div>
                                                    <div className="flex flex-col min-w-0 flex-1">
                                                        <h3 className={`text-xl sm:text-2xl font-black mb-1.5 transition-colors ${isSelected ? 'text-blue-800' : 'text-slate-900'}`}>
                                                            {m.name}
                                                        </h3>
                                                        <div className="flex flex-nowrap items-center gap-1 w-full overflow-x-auto custom-scrollbar pb-1">
                                                            <span className={`flex-shrink-0 text-[10px] font-black px-2 py-0.5 rounded-full border ${getPosColorClass(m.position)} shadow-sm`}>{m.position}</span>
                                                            {m.role && m.role !== '회원' && <span className={`flex-shrink-0 text-[9px] px-2 py-0.5 rounded-lg font-black ${getRoleBadgeClass(m.role)} shadow-sm uppercase`}>{m.role}</span>}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'details' && (
                            <div className="animate-zoom-in">
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 gap-4">
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-800 tracking-tighter">주문 상세 정보</h2>
                                        <p className="text-xs font-bold text-slate-400 mt-1">사이즈, 등번호, 마킹 정보를 꼼꼼히 확인해주세요.</p>
                                    </div>
                                    <button 
                                        onClick={exportToCSV}
                                        className="flex justify-center items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-xl shadow-slate-200 font-black transition-all active:scale-95 text-sm"
                                    >
                                        <Icon.Download size={16} /> CSV로 명단 내보내기
                                    </button>
                                </div>

                                {orderingMembers.length === 0 ? (
                                    <div className="bg-white p-16 rounded-[48px] shadow-sm border border-slate-100 text-center flex flex-col items-center">
                                        <div className="w-20 h-20 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center mb-4">
                                            <Icon.Shirt size={40} />
                                        </div>
                                        <h3 className="text-xl font-black text-slate-600 tracking-tighter">선택된 구매 희망자가 없습니다</h3>
                                        <p className="text-sm font-bold text-slate-400 mt-2">이전 탭에서 먼저 구매할 회원을 선택해주세요.</p>
                                        <button 
                                            onClick={() => setActiveTab('selection')}
                                            className="mt-6 px-6 py-3 bg-blue-50 text-blue-600 rounded-xl font-black text-sm hover:bg-blue-100 transition-all"
                                        >
                                            구매자 선택하러 가기
                                        </button>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="overflow-x-auto custom-scrollbar p-2">
                                            <table className="w-full text-left border-collapse min-w-[1000px]">
                                                <thead>
                                                    <tr className="text-slate-400 text-[11px] uppercase tracking-widest font-black border-b border-slate-100">
                                                        <th className="p-4 pl-6 whitespace-nowrap">이름</th>
                                                        <th className="p-4 whitespace-nowrap">소매 기장</th>
                                                        <th className="p-4 whitespace-nowrap">상의 사이즈</th>
                                                        <th className="p-4 whitespace-nowrap">등번호</th>
                                                        <th className="p-4 whitespace-nowrap">마킹 이름</th>
                                                        <th className="p-4 text-center whitespace-nowrap">반바지 추가</th>
                                                        <th className="p-4 whitespace-nowrap text-center">하의 사이즈</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {orderingMembers.map(member => (
                                                        <tr key={member.id} className="hover:bg-slate-50/50 transition-colors group">
                                                            <td className="p-5 pl-6">
                                                                <div className="flex items-center gap-3">
                                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-black ${getGenderPastelClass(member.gender)}`}>
                                                                        {member.gender === '남성' ? 'M' : 'F'}
                                                                    </div>
                                                                    <span className="font-black text-slate-800 text-base whitespace-nowrap">{member.name}</span>
                                                                </div>
                                                            </td>
                                                            <td className="p-3">
                                                                <div className="relative">
                                                                    <select 
                                                                        value={orders[member.id].sleeveType || '반팔'}
                                                                        onChange={(e) => updateOrderDetail(member.id, 'sleeveType', e.target.value)}
                                                                        className="w-full p-3 pr-8 bg-slate-50 rounded-xl font-black text-slate-700 outline-none border-2 border-transparent focus:border-blue-200 focus:bg-white text-sm transition-all appearance-none cursor-pointer"
                                                                    >
                                                                        <option value="반팔">반팔</option>
                                                                        <option value="긴팔">긴팔</option>
                                                                    </select>
                                                                </div>
                                                            </td>
                                                            <td className="p-3">
                                                                <div className="relative">
                                                                    <select 
                                                                        value={orders[member.id].topSize || orders[member.id].size || '100(L)'}
                                                                        onChange={(e) => updateOrderDetail(member.id, 'topSize', e.target.value)}
                                                                        className="w-full p-3 pr-8 bg-slate-50 rounded-xl font-black text-slate-700 outline-none border-2 border-transparent focus:border-blue-200 focus:bg-white text-sm transition-all appearance-none cursor-pointer"
                                                                    >
                                                                        {SIZES.map(size => (
                                                                            <option key={size} value={size}>{size}</option>
                                                                        ))}
                                                                    </select>
                                                                </div>
                                                            </td>
                                                            <td className="p-3">
                                                                <input 
                                                                    type="number" 
                                                                    min="0" 
                                                                    max="99"
                                                                    placeholder="0~99"
                                                                    value={orders[member.id].number}
                                                                    onChange={(e) => updateOrderDetail(member.id, 'number', e.target.value)}
                                                                    className="w-20 p-3 bg-slate-50 rounded-xl font-black text-slate-700 outline-none border-2 border-transparent focus:border-blue-200 focus:bg-white text-sm transition-all text-center placeholder:font-bold"
                                                                />
                                                            </td>
                                                            <td className="p-3">
                                                                <input 
                                                                    type="text" 
                                                                    value={orders[member.id].printName}
                                                                    onChange={(e) => updateOrderDetail(member.id, 'printName', e.target.value)}
                                                                    className="w-full p-3 bg-slate-50 rounded-xl font-black text-slate-700 outline-none border-2 border-transparent focus:border-blue-200 focus:bg-white text-sm transition-all"
                                                                />
                                                            </td>
                                                            <td className="p-3 text-center">
                                                                <label className="inline-flex items-center justify-center cursor-pointer p-2 rounded-xl hover:bg-slate-100 transition-colors">
                                                                    <input 
                                                                        type="checkbox" 
                                                                        checked={orders[member.id].includeShorts}
                                                                        onChange={(e) => updateOrderDetail(member.id, 'includeShorts', e.target.checked)}
                                                                        className="w-5 h-5 accent-blue-600 rounded cursor-pointer"
                                                                    />
                                                                    <span className={`ml-2 text-xs font-black whitespace-nowrap ${orders[member.id].includeShorts ? 'text-blue-600' : 'text-slate-400'}`}>
                                                                        {orders[member.id].includeShorts ? '추가함' : '미추가'}
                                                                    </span>
                                                                </label>
                                                            </td>
                                                            <td className="p-3">
                                                                {orders[member.id].includeShorts ? (
                                                                    <div className="relative animate-fade-in">
                                                                        <select 
                                                                            value={orders[member.id].bottomSize || '100(L)'}
                                                                            onChange={(e) => updateOrderDetail(member.id, 'bottomSize', e.target.value)}
                                                                            className="w-full p-3 pr-8 bg-blue-50 rounded-xl font-black text-blue-700 outline-none border-2 border-blue-200 focus:border-blue-400 focus:bg-white text-sm transition-all appearance-none cursor-pointer"
                                                                        >
                                                                            {SIZES.map(size => (
                                                                                <option key={size} value={size}>{size}</option>
                                                                            ))}
                                                                        </select>
                                                                    </div>
                                                                ) : (
                                                                    <div className="w-full p-3 bg-slate-100/50 rounded-xl font-black text-slate-300 text-sm text-center border-2 border-transparent select-none whitespace-nowrap">
                                                                        선택 안함
                                                                    </div>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
