                                                <label className="flex items-center gap-2 cursor-pointer bg-white p-3 rounded-xl border border-slate-200 flex-1 hover:border-blue-300 transition-colors">
                                                    <input type="checkbox" checked={brandForm.hasSleeve} onChange={e => setBrandForm({...brandForm, hasSleeve: e.target.checked})} className="w-4 h-4 accent-blue-600"/>
                                                    <span className="text-xs font-black text-slate-700">긴팔/반팔 사용</span>
                                                </label>
                                            </div>

                                            {brandForm.hasShorts && (
                                                <div className="mt-2 p-4 bg-white border border-slate-200 rounded-2xl">
                                                    <label className="block text-[10px] font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">하의 사이즈 목록</label>
                                                    <div className="flex flex-wrap gap-2 mb-3 bg-slate-50 p-3 rounded-xl border border-slate-100 min-h-[50px]">
                                                        {brandForm.bottomSizes.map(size => (
                                                            <span key={size} className="bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-1 border border-slate-300">
                                                                {size}
                                                                <button onClick={() => handleRemoveBottomSize(size)} className="text-slate-400 hover:text-red-500 ml-1 p-0.5 rounded transition-colors"><Icon.X size={12}/></button>
                                                            </span>
                                                        ))}
                                                        {brandForm.bottomSizes.length === 0 && <span className="text-xs text-slate-400 font-bold self-center ml-1">등록된 사이즈가 없습니다.</span>}
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <input type="text" value={newBottomSize} onChange={e => setNewBottomSize(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddBottomSize()} placeholder="새 하의 사이즈 입력 (예: M)" className="flex-1 p-3 bg-slate-50 rounded-xl font-black text-sm outline-none border border-slate-200 focus:border-blue-500 transition-all"/>
                                                        <button onClick={handleAddBottomSize} className="px-5 py-3 bg-slate-800 text-white font-black rounded-xl text-sm shadow-sm active:scale-95 transition-all">추가</button>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="flex gap-2 mt-4">
                                                {brandForm.id && (
                                                    <button onClick={() => {
                                                        setBrandForm({ id: '', name: '', topSizes: [...SIZES], bottomSizes: [...SIZES], hasSleeve: true, hasShorts: true });
                                                        setNewTopSize('');
                                                        setNewBottomSize('');
                                                    }} className="py-3 px-5 bg-white border border-slate-200 text-slate-500 font-black rounded-xl text-sm hover:bg-slate-50 transition-all shadow-sm">작성 취소</button>
                                                )}
                                                <button onClick={saveBrand} className="flex-1 py-3 bg-blue-600 text-white font-black rounded-xl text-sm shadow-md shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all flex justify-center items-center gap-2">
                                                    {brandForm.id ? <><Icon.Save size={16}/> 변경 내용 저장</> : <><Icon.Plus size={16}/> 브랜드 추가 완료</>}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 수동 인원 추가/수정 모달 */}
                    {isManualModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[6000] flex justify-center items-center p-4 animate-fade-in" onClick={() => setIsManualModalOpen(false)}>
                            <div className="bg-white w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden flex flex-col animate-zoom-in p-6 sm:p-8" onClick={e => e.stopPropagation()}>
                                <div className="text-center mb-6">
                                    <div className="w-14 h-14 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                                        {manualForm.id ? <Icon.Edit2 size={28} /> : <Icon.UserPlus size={28} />}
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tighter">{manualForm.id ? '직접 인원 수정' : '직접 인원 추가'}</h2>
                                    <p className="text-xs font-bold text-slate-400 mt-2">지인, 가족 등 명단에 없는 인원을<br/>주문 목록에 추가합니다.</p>
                                </div>
                                
                                <div className="flex flex-col gap-4 mb-6">
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-500 mb-1 ml-1 uppercase tracking-widest">이름</label>
                                        <input 
                                            type="text" 
                                            value={manualForm.name} 
                                            onChange={e => setManualForm({...manualForm, name: e.target.value})} 
                                            placeholder="이름 입력 (예: 김철수 지인)" 
                                            className="w-full p-4 bg-slate-50 rounded-2xl font-black text-sm outline-none border border-slate-200 focus:border-blue-500 transition-all"
                                            autoFocus
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-500 mb-1 ml-1 uppercase tracking-widest">성별</label>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => setManualForm({...manualForm, gender: '남성'})} 
                                                className={`flex-1 py-3 rounded-2xl font-black text-sm transition-all border-2 ${manualForm.gender === '남성' ? 'bg-blue-50 border-blue-400 text-blue-600 shadow-sm' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}`}
                                            >
                                                남성
                                            </button>
                                            <button 
                                                onClick={() => setManualForm({...manualForm, gender: '여성'})} 
                                                className={`flex-1 py-3 rounded-2xl font-black text-sm transition-all border-2 ${manualForm.gender === '여성' ? 'bg-pink-50 border-pink-400 text-pink-600 shadow-sm' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}`}
                                            >
                                                여성
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={() => { setIsManualModalOpen(false); setManualForm({ id: null, name: '', gender: '남성' }); }} className="flex-1 py-4 bg-white border border-slate-200 text-slate-500 font-black rounded-2xl text-sm hover:bg-slate-50 transition-all shadow-sm">취소</button>
                                    <button onClick={handleSaveManualBuyer} className="flex-1 py-4 bg-blue-600 text-white font-black rounded-2xl text-sm shadow-md shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">{manualForm.id ? '수정하기' : '추가하기'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 커스텀 알림/확인 모달창 (alert/confirm 대체) */}
                    {modalConfig && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[9999] flex items-center justify-center p-4 animate-fade-in" onClick={() => setModalConfig(null)}>
                            <div className="bg-white rounded-[32px] p-8 max-w-sm w-full shadow-2xl text-center animate-zoom-in border border-slate-100" onClick={e => e.stopPropagation()}>
                                <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                                    <Icon.AlertCircle size={32} />
                                </div>
                                <p className="text-slate-800 font-black mb-8 text-base whitespace-pre-wrap">{modalConfig.message}</p>
                                <div className="flex gap-3">
                                    {modalConfig.type === 'confirm' && (
                                        <button onClick={() => setModalConfig(null)} className="flex-1 py-4 bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-700 font-black rounded-2xl active:scale-95 transition-all text-sm">취소</button>
                                    )}
                                    <button onClick={() => {
                                        if (modalConfig.onConfirm) modalConfig.onConfirm();
                                        setModalConfig(null);
                                    }} className="flex-1 py-4 bg-blue-600 text-white hover:bg-blue-700 font-black rounded-2xl active:scale-95 transition-all shadow-md shadow-blue-200 text-sm">
                                        {modalConfig.type === 'confirm' ? '확인' : '닫기'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
