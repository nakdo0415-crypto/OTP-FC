                                    <div className="flex flex-col gap-1.5 text-left"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase">상세 정보</label><div className="grid grid-cols-1 gap-3 max-h-[180px] overflow-y-auto pr-2 custom-scrollbar">{Array.from({ length: presetForm.courtCount }).map((_, i) => (<div key={i} className="flex gap-2 items-center bg-slate-50 p-2 rounded-2xl border-2 border-transparent focus-within:border-blue-100 transition-colors"><input type="text" className="flex-1 bg-white p-3 rounded-xl font-black text-xs border-none shadow-sm outline-none" value={presetForm.fieldNames[i] || ''} placeholder={`${i+1}번 구장`} onChange={(e) => { const n = [...presetForm.fieldNames]; n[i] = e.target.value; setPresetForm({...presetForm, fieldNames: n}); }}/><button onClick={() => { const t = [...presetForm.fieldTypes]; t[i] = t[i] === "6vs6" ? "5vs5" : "6vs6"; setPresetForm({...presetForm, fieldTypes: t}); }} className={`px-4 py-3 rounded-xl font-black text-xs transition-all shadow-sm outline-none border-none ${presetForm.fieldTypes[i] === '5vs5' ? 'bg-rose-50 text-rose-500' : 'bg-blue-50 text-blue-500'}`}>{presetForm.fieldTypes[i] || '6vs6'}</button></div>))}</div></div>
                                </div>
                                <div className="flex gap-3"><button onClick={() => setIsPresetModalOpen(false)} className="flex-1 py-5 bg-slate-100 text-slate-500 font-black rounded-3xl text-xs shadow-none active:scale-95 transition-all outline-none border-none uppercase">취소</button><button onClick={async () => { if(!presetForm.name.trim()) return; await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('court_presets').add({ ...presetForm, fieldNames: presetForm.fieldNames.slice(0, presetForm.courtCount), fieldTypes: presetForm.fieldTypes.slice(0, presetForm.courtCount), createdAt: new Date().toISOString() }); setIsPresetModalOpen(false); }} disabled={!presetForm.name.trim()} className="flex-1 py-5 bg-blue-600 text-white font-black rounded-3xl text-xs shadow-xl shadow-blue-100 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed outline-none border-none uppercase">저장</button></div>
                            </div>
                        </div>
                    )}

                    {presetToDelete && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[10000] flex items-center justify-center p-4" onClick={() => setPresetToDelete(null)}>
                            <div className="bg-white rounded-[48px] p-10 w-full max-w-sm shadow-2xl animate-zoom-in text-center" onClick={e => e.stopPropagation()}>
                                <div className="w-20 h-20 bg-rose-50 text-rose-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-inner"><Icon.Trash size={32} /></div>
                                <h3 className="font-black text-2xl mb-2 tracking-tighter text-slate-900">프리셋 삭제</h3>
                                <p className="text-slate-500 font-bold mb-10 text-sm">해당 구장 프리셋을 정말 삭제하시겠습니까?</p>
                                <div className="flex gap-3 mt-6"><button onClick={() => setPresetToDelete(null)} className="flex-1 py-5 bg-slate-100 text-slate-500 font-black rounded-3xl text-xs shadow-none active:scale-95 transition-all outline-none border-none uppercase">취소</button><button onClick={async () => { await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('court_presets').doc(presetToDelete).delete(); setPresetToDelete(null); }} className="flex-1 py-5 bg-rose-500 text-white font-black rounded-3xl text-xs active:scale-95 transition-all shadow-xl shadow-rose-100 outline-none border-none uppercase">삭제</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
